spring.application.name=final

# -----------------------------------------------
# Thymeleaf (?? ????? ?? ???)
# -----------------------------------------------
spring.thymeleaf.cache=true

spring.main.allow-bean-definition-overriding=true

# -----------------------------------------------
# MySQL DataSource
# -----------------------------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# -----------------------------------------------
# MyBatis
# -----------------------------------------------
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=PickMeal.PickMeal.domain

# -----------------------------------------------
# File Upload
# -----------------------------------------------
file.upload-dir=${FILE_UPLOAD_DIR:/tmp/upload/}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# -----------------------------------------------
# Error Handling
# -----------------------------------------------
server.error.path=/error
server.error.whitelabel.enabled=false
server.error.include-message=never
server.error.include-binding-errors=never

# -----------------------------------------------
# Security Filter
# -----------------------------------------------
spring.security.filter.dispatcher-types=async, error, forward, request

# -----------------------------------------------
# OAuth2 - Kakao
# -----------------------------------------------
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.redirect-uri=${SERVER_BASE_URL}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.scope=profile_nickname, account_email

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize?prompt=login
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# -----------------------------------------------
# OAuth2 - Naver
# -----------------------------------------------
spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET}
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri=${SERVER_BASE_URL}/login/oauth2/code/naver
spring.security.oauth2.client.registration.naver.scope=name,email,nickname

spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize?auth_type=reauthenticate
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

# -----------------------------------------------
# OAuth2 - Google
# -----------------------------------------------
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth?prompt=select_account
spring.security.oauth2.client.registration.google.scope=profile, email

# -----------------------------------------------
# Mail (Gmail SMTP)
# -----------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.timeout=5000
admin.mail.id=${MAIL_USERNAME}

# -----------------------------------------------
# AWS S3
# -----------------------------------------------
cloud.aws.s3.bucket=${AWS_S3_BUCKET}
cloud.aws.region.static=${AWS_REGION:ap-northeast-2}
cloud.aws.s3.bucket.url=https://s3.${AWS_REGION:ap-northeast-2}.amazonaws.com/${AWS_S3_BUCKET}
cloud.aws.credentials.accessKey=${AWS_ACCESS_KEY}
cloud.aws.credentials.secretKey=${AWS_SECRET_KEY}
cloud.aws.stack.auto=false

# -----------------------------------------------
# Redis (??/?? ?? ? ?? ??)
# -----------------------------------------------
#spring.data.redis.host=${REDIS_HOST:localhost}
#spring.data.redis.port=${REDIS_PORT:6379}
#spring.data.redis.password=${REDIS_PASSWORD:}
#spring.session.store-type=redis
#spring.session.redis.flush-mode=on_save

# -----------------------------------------------
# JPA
# -----------------------------------------------
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

# -----------------------------------------------
# Server
# -----------------------------------------------
server.port=${PORT:8080}