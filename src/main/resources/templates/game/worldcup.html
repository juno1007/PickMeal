<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick Meal - 월드컵 진행중</title>
    <link rel="icon" href="/images/pickmeal_favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700;800&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

        /* [기존 유지] 레이아웃 구조 */
        body {
            font-family: 'Fredoka', 'Jua', sans-serif !important;
            background-color: #FFF5F0;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6, p, span, div, button, a, label, input, select {
            font-family: 'Fredoka', 'Jua', sans-serif !important;
            font-style: normal !important;
        }

        header, footer { z-index: 1200 !important; position: relative; }

        .nav-link {
            font-family: 'Fredoka', 'Jua', sans-serif !important;
            font-weight: 700 !important;
            font-style: italic !important;
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 150px;
            box-sizing: border-box;
            position: relative;
        }

        /* [기존 유지] 호버 효과 */
        .food-card:hover {
            border-color: #FF8A5B;
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(255, 138, 91, 0.2);
        }

        /* [기존 유지] 애니메이션 효과 */
        .selected-left {
            transform: translateX(250px) scale(1.05) rotate(0deg) !important;
            opacity: 0;
            pointer-events: none;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        .selected-right {
            transform: translateX(-250px) scale(1.05) rotate(0deg) !important;
            opacity: 0;
            pointer-events: none;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        .fade-out {
            opacity: 0 !important;
            transform: scale(0.8) !important;
            pointer-events: none;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        /* [수정] 메인 컨테이너 - 전체 화면 정렬 및 줄바꿈 */
        main .flex.items-center.justify-center {
            flex-wrap: wrap !important;
            gap: 2rem !important;
            max-width: 1200px !important;
            margin: 0 auto !important;
            width: 100%;
            display: flex !important;
        }

        /* [수정] 카드 사이즈 고정 - 전체 화면에서 대칭을 맞춤 */
        .food-card {
            background: white;
            border-radius: 3rem;
            transition: all 0.5s ease;
            cursor: pointer;
            border: 4px solid transparent;
            /* flex-basis를 동일하게 주어 양쪽 크기를 맞춤 */
            flex: 0 1 400px !important;
            width: 400px !important;
            min-width: 300px !important;
            display: flex;
            flex-direction: column;
        }

        /* [추가] 사진 영역 정사각형 비율 고정 */
        .food-card .bg-\[\#FFF5F0\] {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 1 / 1 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            overflow: hidden !important;
            border-radius: 2.5rem !important;
            margin-bottom: 1.5rem;
        }

        .food-card img {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        /* [기존 유지 및 수정] VS 배지 */
        .vs-badge {
            text-shadow: 3px 3px 0px rgba(255, 138, 91, 0.15);
            font-style: italic;
            flex-shrink: 0;
        }

        @media (max-width: 850px) {
            #vs-text { display: none !important; }
            .food-card { flex: 1 1 100% !important; max-width: 450px !important; }
        }

        /* [기존 유지] 우승창 설정 */
        .winner-card-mid {
            max-width: 410px !important;
            padding: 2rem !important;
            border-radius: 3.5rem !important;
            background: white;
            margin: 0 auto;
        }
        .winner-img-mid {
            height: 280px !important;
            border-radius: 2.5rem !important;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<header th:replace="~{fragments/header :: headerFragment}"></header>

<main class="px-10" id="game-main">

    <div style="height: 50px;"></div>

    <div class="text-center mb-10">
        <h1 id="roundTitle" class="text-6xl font-black text-[#FF8A5B] italic uppercase tracking-tighter mb-2" th:text="${totalRound} + '강'">라운드</h1>
        <p id="matchInfo" class="text-2xl font-black text-gray-500 italic uppercase mb-2">Match 1 / 32</p>
        <p class="text-[#FF8A5B] font-bold italic uppercase text-xl">좋아하는 음식을 선택하세요!</p>
    </div>

    <div class="flex items-center justify-center gap-10 w-full">
        <div class="food-card p-6 shadow-xl text-center" id="cardA" onclick="selectFood(0)">
            <div class="bg-[#FFF5F0] rounded-[2.5rem] overflow-hidden mb-6 shadow-inner">
                <img id="imgA" th:src="${foods[0].imagePath}" class="object-cover">
            </div>
            <h3 id="nameA" class="text-2xl font-black text-gray-800 italic uppercase" th:text="${foods[0].foodName}">음식A</h3>
        </div>

        <div class="vs-badge text-7xl font-black text-[#FF8A5B]" id="vs-text">VS</div>

        <div class="food-card p-6 shadow-xl text-center" id="cardB" onclick="selectFood(1)">
            <div class="bg-[#FFF5F0] rounded-[2rem] overflow-hidden mb-6 shadow-inner">
                <img id="imgB" th:src="${foods[1].imagePath}" class="object-cover">
            </div>
            <h3 id="nameB" class="text-2xl font-black text-gray-800 italic uppercase" th:text="${foods[1].foodName}">음식B</h3>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footerFragment}"></footer>

<script th:inline="javascript">
    let foods = [[${foods}]];
    let winners = [];
    let currentIndex = 0;
    let currentRoundTotal = [[${totalRound}]];
    let currentMatchIndex = 1;

    function updateUI() {
        if (!foods[currentIndex] || !foods[currentIndex + 1]) return;

        document.getElementById('roundTitle').innerText = currentRoundTotal === 2 ? "FINAL" : currentRoundTotal + "강";

        const totalMatchesInRound = currentRoundTotal / 2;
        document.getElementById('matchInfo').innerText = `Match ${currentMatchIndex} / ${totalMatchesInRound}`;

        document.getElementById('imgA').src = foods[currentIndex].imagePath;
        document.getElementById('nameA').innerText = foods[currentIndex].foodName;
        document.getElementById('imgB').src = foods[currentIndex + 1].imagePath;
        document.getElementById('nameB').innerText = foods[currentIndex + 1].foodName;

        const cardA = document.getElementById('cardA');
        const cardB = document.getElementById('cardB');
        const vsText = document.getElementById('vs-text');

        cardA.classList.remove('selected-left', 'fade-out');
        cardB.classList.remove('selected-right', 'fade-out');
        vsText.style.opacity = "1";

        cardA.style.opacity = "1";
        cardB.style.opacity = "1";
        cardA.style.pointerEvents = "auto";
        cardB.style.pointerEvents = "auto";
    }

    function selectFood(offset) {
        const cardA = document.getElementById('cardA');
        const cardB = document.getElementById('cardB');
        const vsText = document.getElementById('vs-text');

        vsText.style.opacity = "0";
        vsText.style.transition = "opacity 1.2s ease";

        if (offset === 0) {
            cardA.classList.add('selected-left');
            cardB.classList.add('fade-out');
        } else {
            cardB.classList.add('selected-right');
            cardA.classList.add('fade-out');
        }

        // 애니메이션 속도(1.2초)에 맞춰 여유있게 1.3초 후 다음 UI로 전환
        setTimeout(() => {
            winners.push(foods[currentIndex + offset]);
            currentIndex += 2;

            // 다음 대결로 넘어가니까 숫자 +1
            currentMatchIndex++;

            if (currentIndex >= foods.length) {
                if (winners.length === 1) {
                    showWinnerEffect(winners[0]);
                    return;
                }
                foods = winners;
                winners = [];
                currentIndex = 0;
                currentRoundTotal = foods.length;

                // 다음 라운드(예: 8강)가 시작되니 다시 1번부터!
                currentMatchIndex = 1;
            }
            updateUI();
        }, 1300);
    }

    function showWinnerEffect(winner) {
        fetch('/worldcup/win/' + winner.foodId, { method: 'POST' }).catch(e => {});

        const main = document.getElementById('game-main');
        main.style.paddingTop = "0"; // 기존의 150px 패딩 제거
        main.className = "flex flex-col items-center justify-center w-full min-h-[100vh] px-10";

        main.innerHTML = `
            <div class="flex flex-col items-center justify-center w-full animate-bounce mb-2">
                <h2 class="text-[#FF8A5B] font-black text-5xl uppercase italic tracking-tighter">WINNER</h2>
            </div>
            <div class="bg-white winner-card-mid shadow-2xl border-4 border-[#FF8A5B] w-full text-center">
                <div class="overflow-hidden winner-img-mid mb-6 shadow-md">
                    <img src="${winner.imagePath}" class="w-full h-full object-cover">
                </div>
                <h1 class="text-4xl font-black text-gray-800 italic mb-6 uppercase tracking-tighter">${winner.foodName}</h1>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <button onclick="location.href='/game'" class="py-3 bg-gray-100 rounded-2xl font-bold italic uppercase text-sm hover:bg-gray-200 transition">HOME 🏠</button>
                    <button onclick="location.href='/worldcup/setup'" class="py-3 bg-gray-100 rounded-2xl font-bold italic uppercase text-sm hover:bg-gray-200 transition">RESTART 🔄</button>
                    <button onclick="location.href='/worldcup/ranking'" class="py-3 bg-gray-100 rounded-2xl font-bold italic uppercase text-sm hover:bg-gray-200 transition">RANK 🏆</button>
                    <button onclick="copyToClipboard('${winner.foodName}')" class="py-3 bg-gray-100 rounded-2xl font-bold italic uppercase text-sm hover:bg-gray-200 transition">SHARE 🔗</button>
                </div>
                <button onclick="window.open('https://map.kakao.com/link/search/' + encodeURIComponent('${winner.foodName}'))"
                        class="w-full py-4 bg-[#FAE100] rounded-full font-black text-lg shadow-md hover:bg-[#ebd300] transition italic">
                    주변 맛집 찾기 📍
                </button>
            </div>
        `;
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, zIndex: 9999 });
    }

    window.copyToClipboard = function(foodName) {
        navigator.clipboard.writeText(`🏆 나의 원픽 메뉴: [${foodName}]`).then(() => alert("복사 완료!"));
    };

    updateUI();
</script>
</body>
</html>
