<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf?.token}" th:if="${_csrf}"/>
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" th:if="${_csrf}"/>
    <title>Pick Meal - 스무고개 게임</title>
    <link rel="icon" href="/images/pickmeal_favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

        * { box-sizing: border-box; }

        body {
            font-family: 'Fredoka', 'Jua', sans-serif;
            background-color: #FFF5F0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        [data-custom-header] a, [data-custom-header] button, [data-custom-header] span, .custom-italic {
            font-family: 'Fredoka', sans-serif !important;
            font-weight: 800 !important;
            font-style: italic !important;
            display: inline-block !important;
        }

        h1, h2, h3, h4, h5, h6, p, span, div, button, a, label, input, select {
            font-family: 'Fredoka', 'Jua', sans-serif !important;
            font-style: normal !important;
        }

        header, footer { z-index: 1200 !important; position: relative; }

        /* ========== 배경 장식 ========== */
        .bg-decorations {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-deco {
            position: absolute;
            animation: floatDeco 5s ease-in-out infinite;
        }
        .bg-deco:nth-child(odd) { animation-direction: reverse; }
        .bg-deco.star { color: #FFD700; text-shadow: 0 0 8px rgba(255,215,0,0.5); }
        .bg-deco.heart { color: #FF8A5B; opacity: 0.6; }
        .bg-deco.sparkle { color: #FFB6C1; }

        @keyframes floatDeco {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(5deg); }
        }

        /* ========== 메인 ========== */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 100px 20px 40px;
            position: relative;
            z-index: 10;
        }

        /* ========== 게임 컨테이너 ========== */
        .container {
            background: linear-gradient(180deg, #FFFDF5 0%, #FFF8F0 100%);
            border-radius: 3rem;
            padding: 35px 30px;
            box-shadow:
                0 15px 40px rgba(255, 138, 91, 0.15),
                inset 0 2px 10px rgba(255,255,255,0.8);
            width: 100%;
            max-width: 550px;
            text-align: center;
            border: 4px solid #FF8A5B;
            position: relative;
        }

        /* 컨테이너 상단 장식 */
        .container::before {
            content: ';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: #FFF5F0;
            padding: 0 15px;
            font-size: 1.2rem;
            letter-spacing: 8px;
        }

        /* ========== 타이틀 ========== */
        .game-title {
            color: #FF8A5B;
            font-size: 2.8rem;
            font-weight: 800;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 8px;
            text-shadow: 3px 3px 0 #FFD9C8;
            animation: titleBounce 3s ease-in-out infinite;
        }
        @keyframes titleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .game-subtitle {
            color: #A0A0A0;
            font-size: 0.95rem;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* ========== AI 캐릭터 아이콘 ========== */
        .ai-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(145deg, #FF9F70 0%, #FF8A5B 100%);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow:
                0 6px 20px rgba(255,138,91,0.35),
                inset 0 -3px 8px rgba(0,0,0,0.1);
            border: 3px solid #E67245;
            animation: aiFloat 3s ease-in-out infinite;
        }
        @keyframes aiFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* ========== 질문 박스 (말풍선 스타일) ========== */
        .question-box {
            background: #FFF;
            border: 4px solid #FF8A5B;
            border-radius: 2rem;
            padding: 25px 20px;
            font-size: 1.4em;
            color: #333;
            margin-bottom: 30px;
            position: relative;
            font-weight: 600;
            box-shadow: 0 8px 25px rgba(255,138,91,0.1);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 말풍선 꼬리 */
        .question-box::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 25px;
            font-size: 1.3rem;
            background: #FFF5F0;
            padding: 0 8px;
        }
        .question-box::after {
            content: '';
            position: absolute;
            top: -10px;
            right: 30px;
            width: 20px;
            height: 20px;
            background: #FFF;
            border-left: 4px solid #FF8A5B;
            border-top: 4px solid #FF8A5B;
            transform: rotate(45deg);
        }

        #question-text {
            line-height: 1.5;
        }

        /* ========== 버튼 ========== */
        .buttons-box {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
        }

        .btn {
            background: linear-gradient(145deg, #FF9F70 0%, #FF8A5B 100%);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 14px 40px;
            font-size: 1.3em;
            font-weight: 800;
            font-style: italic;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 6px 0 #D96A40, 0 10px 20px rgba(255,138,91,0.25);
            text-transform: uppercase;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #D96A40, 0 15px 25px rgba(255,138,91,0.3);
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #D96A40;
        }

        .btn.yes {
            background: linear-gradient(145deg, #FF9F70 0%, #FF8A5B 100%);
            box-shadow: 0 6px 0 #D96A40, 0 10px 20px rgba(255,138,91,0.25);
        }
        .btn.no {
            background: linear-gradient(145deg, #6FCF97 0%, #4CAF50 100%);
            box-shadow: 0 6px 0 #3D8B40, 0 10px 20px rgba(76,175,80,0.25);
        }
        .btn.no:hover {
            box-shadow: 0 9px 0 #3D8B40, 0 15px 25px rgba(76,175,80,0.3);
        }
        .btn.no:active {
            box-shadow: 0 3px 0 #3D8B40;
        }

        /* ========== 프로그레스 섹션 ========== */
        .progress-section {
            background: rgba(255,138,91,0.08);
            border-radius: 1.5rem;
            padding: 20px 15px 30px;
            margin-top: 10px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #888;
            font-weight: 600;
        }

        .progress-count {
            background: #FF8A5B;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .progress-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            position: relative;
        }

        .character {
            font-size: 2.5em;
            position: absolute;
            bottom: 12px;
            left: 0;
            transition: left 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.15));
        }
        .character img {
            width: 45px;
            height: 45px;
            animation: characterBounce 0.6s ease-in-out infinite;
        }
        @keyframes characterBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .progress-track {
            display: flex;
            justify-content: space-between;
            width: 100%;
            position: relative;
            align-items: center;
            padding: 0 5px;
        }

        .progress-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #FFE4D9 0%, #FED7D7 100%);
            transform: translateY(-50%);
            z-index: 0;
            border-radius: 3px;
        }

        .progress-step {
            width: 16px;
            height: 16px;
            background-color: #FFF;
            border-radius: 50%;
            border: 3px solid #FFB89A;
            z-index: 1;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(255,138,91,0.15);
        }
        .progress-step.active {
            background: linear-gradient(145deg, #FFD93D 0%, #FF8A5B 100%);
            border-color: #FF8A5B;
            transform: scale(1.15);
            box-shadow: 0 3px 10px rgba(255,138,91,0.3);
        }
        .progress-step.final {
            width: 28px !important;
            height: 28px !important;
            background: linear-gradient(145deg, #FFD700 0%, #FFC000 100%) !important;
            border-color: #E6B000 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        /* ========== 결과 화면 (기존 100% 유지) ========== */
        .winner-card-mid {
            max-width: 410px !important;
            padding: 2rem !important;
            border-radius: 3.5rem !important;
            background: white;
            margin: 0 auto;
        }
        .winner-img-mid {
            height: 280px !important;
            border-radius: 2.5rem !important;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* ========== 반응형 ========== */
        @media (max-width: 500px) {
            .container { padding: 30px 20px; }
            .game-title { font-size: 2.2rem; }
            .question-box { font-size: 1.2em; padding: 20px 15px; }
            .btn { padding: 12px 30px; font-size: 1.1em; }
            .buttons-box { gap: 12px; }
            .ai-icon { width: 60px; height: 60px; font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<!-- 배경 장식 -->
<div class="bg-decorations">
    <span class="bg-deco star" style="top: 10%; left: 5%; font-size: 20px;">✦</span>
    <span class="bg-deco star" style="top: 20%; right: 8%; font-size: 16px;">✦</span>
    <span class="bg-deco star" style="top: 50%; left: 3%; font-size: 14px;">✦</span>
    <span class="bg-deco star" style="top: 70%; right: 5%; font-size: 18px;">✦</span>
    <span class="bg-deco heart" style="top: 15%; left: 12%; font-size: 16px;">♥</span>
    <span class="bg-deco heart" style="top: 40%; right: 10%; font-size: 14px;">♥</span>
    <span class="bg-deco heart" style="top: 75%; left: 8%; font-size: 12px;">♥</span>
    <span class="bg-deco sparkle" style="top: 25%; right: 15%; font-size: 14px;">✧</span>
    <span class="bg-deco sparkle" style="top: 60%; left: 10%; font-size: 12px;">✧</span>
</div>

<div data-custom-header style="width: 100%;">
    <header th:replace="~{fragments/header :: headerFragment}"></header>
</div>

<main id="game-main">
    <div class="container" id="main-container">
        <!-- AI 아이콘 -->
        <div class="ai-icon"><img src="/images/meal.png" alt="character"></div>

        <!-- 타이틀 -->
        <div class="header">
            <h1 class="game-title">스무고개</h1>
            <p class="game-subtitle">PickMeal이 당신이 원하는 음식을 맞춰볼게요!</p>
        </div>

        <!-- 질문 박스 -->
        <div class="question-box">
            <span id="question-text">질문을 불러오는 중입니다... 🤔</span>
        </div>

        <!-- 버튼 -->
        <div class="buttons-box">
            <button class="btn yes" onclick="nextQuestion(true)">👍 네!</button>
            <button class="btn no" onclick="nextQuestion(false)">👎 아니요!</button>
        </div>

        <!-- 프로그레스 -->
        <div class="progress-section">
            <div class="progress-label">
                <span>🎯 진행 상황</span>
                <span class="progress-count" id="progress-count">0/20</span>
            </div>
            <div class="progress-bar">
                <div class="character" id="character">
                    <img src="/images/meal.png" alt="character">
                </div>
                <div class="progress-track" id="progress-track">
                    <div class="progress-line"></div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footerFragment}"></footer>

<script th:inline="javascript">
    // ========== 기존 변수 100% 유지 ==========
    let currentState = {
        categoryKorean: null, categoryWestern: null, categoryChinese: null,
        categoryJapanese: null, categoryAsian: null,
        isSpicy: null, isSoup: null, isFried: null, isRoasted: null,
        hasPork: null, hasBeef: null, hasNoodle: null, hasRice: null, hasFlour: null, hasSeafood: null, hasChicken: null,
        isVeggie: null, isCold: null, isGreasy: null, isSweet: null, isSolo: null, isSharing: null, isHeavy: null,
        askedQuestionIds: []
    };

    let currentAttribute = "";
    let currentQuestionStep = 0;
    const maxSteps = 20;
    let remainingFoods = [];
    let finalTemplate = "";
    let currentSuggestingFood = "";

    // ========== 기존 함수 100% 유지 ==========
    window.onload = () => { fetchNextStep(); };

    async function fetchNextStep() {
        const csrfHeaderMeta = document.querySelector('meta[name="_csrf_header"]');
        const csrfTokenMeta = document.querySelector('meta[name="_csrf"]');
        const headers = { 'Content-Type': 'application/json' };
        if (csrfHeaderMeta && csrfTokenMeta) headers[csrfHeaderMeta.content] = csrfTokenMeta.content;

        try {
            const response = await fetch('/twenty-questions/next', {
                method: 'POST',
                headers: headers,
                body: JSON.stringify(currentState)
            });
            const data = await response.json();

            if (data.status === "QUESTION") {
                document.getElementById('question-text').innerText = data.nextQuestion_text;
                currentAttribute = data.nextAttribute_name;
                currentState.askedQuestionIds.push(parseInt(data.nextQuestion_id));
                currentQuestionStep++;
                updateProgressBar();
            } else if (data.status === "FINAL_CHOICE") {
                remainingFoods = data.remain_foodList;
                finalTemplate = data.nextQuestion_text;
                askFinalFood();
            } else if (data.status === "NO_FOOD") {
                alert("헉! 조건에 딱 맞는 음식이 없네요 😢 처음부터 다시 찾아볼까요?");
                location.reload();
            }
        } catch (error) {
            console.error("서버 통신 에러:", error);
        }
    }

    function askFinalFood() {
        if (remainingFoods.length > 0) {
            currentSuggestingFood = remainingFoods.shift();
            const template = finalTemplate || "는 어떠신가요? 🤔";
            document.getElementById('question-text').innerText = `혹시 생각하신 음식이 '${currentSuggestingFood}' 일까요? 😋`;
            currentQuestionStep++;
            updateProgressBar();
        } else {
            alert("추천해 드린 음식이 다 마음에 안 드시나요? 😭 다시 찾아볼까요?");
            location.reload();
        }
    }

    async function nextQuestion(isYes) {
        if (currentSuggestingFood !== "") {
            if (isYes) {
                try {
                    const imgRes = await fetch(`/twenty-questions/api/food/imagePath?foodName=${encodeURIComponent(currentSuggestingFood)}`);
                    const realImagePath = await imgRes.text();
                    const idRes = await fetch(`/api/food/getIdByName?foodName=${encodeURIComponent(currentSuggestingFood)}`);
                    const foodId = await idRes.json();
                    if (foodId) {
                        fetch('/worldcup/win/' + foodId + '?gameType=twenty', { method: 'POST' }).catch(e => {});
                    }
                    renderWinner(realImagePath, currentSuggestingFood);
                } catch(error) {
                    console.error("결과 처리 중 에러:", error);
                }
            } else {
                askFinalFood();
            }
            return;
        }

        if (currentAttribute) {
            const camelKey = currentAttribute.replace(/_([a-z])/g, (match, letter) => letter.toUpperCase());
            if (currentState.hasOwnProperty(camelKey)) {
                currentState[camelKey] = isYes ? 1 : 0;
            } else {
                currentState[currentAttribute] = isYes ? 1 : 0;
            }
        }
        fetchNextStep();
    }

    // ========== 결과 화면 (기존 100% 유지) ==========
    function renderWinner(imagePath, foodName) {
        const main = document.getElementById('game-main');
        main.className = "flex flex-col items-center justify-center w-full min-h-[70vh] px-10";
        main.innerHTML = `
            <div class="flex flex-col items-center justify-center w-full animate-bounce mb-2">
                <h2 class="text-[#FF8A5B] font-black text-5xl uppercase italic tracking-tighter">WINNER</h2>
            </div>
            <div class="bg-white winner-card-mid shadow-2xl border-4 border-[#FF8A5B] w-full text-center">
                <div class="winner-img-mid mb-6 shadow-md bg-gray-50">
                    <img src="${imagePath}" class="w-full h-full object-cover" onerror="this.src='/images/meal.png'">
                </div>
                <h1 class="text-4xl font-black text-gray-800 italic mb-6 uppercase tracking-tighter">${foodName}</h1>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <button onclick="location.href='/game'" class="py-3 bg-gray-100 rounded-2xl font-bold italic uppercase text-sm">HOME 🏠</button>
                    <button onclick="location.reload()" class="py-3 bg-gray-100 rounded-2xl font-bold italic uppercase text-sm">RESTART 🔄</button>
                    <button onclick="location.href='/worldcup/ranking'" class="py-3 bg-gray-100 rounded-2xl font-bold italic uppercase text-sm">RANK 🏆</button>
                    <button onclick="copyToClipboard('${foodName}')" class="py-3 bg-gray-100 rounded-2xl font-bold italic uppercase text-sm">SHARE 🔗</button>
                </div>
                <button onclick="window.open('https://map.kakao.com/link/search/' + encodeURIComponent('${foodName}'))"
                        class="w-full py-4 bg-[#FAE100] rounded-full font-black text-lg shadow-md italic">
                    주변 맛집 찾기 📍
                </button>
            </div>
        `;
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, zIndex: 9999 });
    }

    // ========== 프로그레스 바 (기존 100% 유지) ==========
    function updateProgressBar() {
        const track = document.getElementById('progress-track');
        const character = document.getElementById('character');
        track.innerHTML = '<div class="progress-line"></div>';
        let displayStep = currentQuestionStep > maxSteps ? maxSteps : currentQuestionStep;
        document.getElementById('progress-count').innerText = `${displayStep}/${maxSteps}`;
        for (let i = 1; i <= maxSteps; i++) {
            const step = document.createElement('div');
            step.classList.add('progress-step');
            if (i <= displayStep) step.classList.add('active');
            if (i === maxSteps) {
                step.classList.add('final');
                step.innerHTML = '🎁';
            }
            track.appendChild(step);
        }
        setTimeout(() => {
            const stepWidth = track.offsetWidth / (maxSteps - 1);
            const characterPosition = (displayStep - 1) * stepWidth;
            character.style.left = `${characterPosition}px`;
        }, 50);
    }

    window.copyToClipboard = function(foodName) {
        navigator.clipboard.writeText(`🏆 나의 원픽 메뉴: [${foodName}]`).then(() => alert("복사 완료!"));
    };
</script>
</body>
</html>
