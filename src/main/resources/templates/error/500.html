<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Pick Meal - 500 Internal Error</title>
    <link rel="icon" href="/images/pickmeal_favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fredoka', sans-serif; background-color: #fffaf8; }
        .italic-text { font-style: italic !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen text-center bg-slate-50">
<div class="max-w-lg p-10 bg-white rounded-3xl shadow-xl">
    <img src="/images/pickmeal_errorpage.png" alt="Error" class="w-64 md:w-56 mx-auto mb-6 opacity-80">
    <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">!</div>
    <h1 class="text-2xl font-bold text-slate-900 mb-4">시스템 일시 오류 안내</h1>
    <p class="text-slate-600 mb-8">
        현재 기술적인 문제로 인해 서비스 이용이 원활하지 않습니다.<br>
        데이터 보호를 위해 안전하게 조치 중이오니 잠시만 기다려 주십시오.
    </p>
    <div class="text-sm text-slate-400 mb-8 p-4 bg-slate-50 rounded-lg italic">
        Error Log: Internal Server Error (500)
    </div>
    <button onclick="location.href='/'" class="w-full py-4 bg-[#FF8A5B] text-white rounded-xl font-bold shadow-lg hover:bg-[#e0764c] transition">
        서비스 홈으로 이동
    </button>
</div>
</body>
</html>
