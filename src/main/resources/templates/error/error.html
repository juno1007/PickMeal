<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pick Meal - Unexpected Error</title>
    <link rel="icon" href="/images/pickmeal_favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fredoka', sans-serif; background-color: #fffaf8; }
        .italic-text { font-style: italic !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen text-center bg-[#FDF5E6]">
<div class="max-w-lg p-10 bg-white rounded-3xl shadow-xl border-2 border-dashed border-[#FFB74D]">
    <img src="/images/pickmeal_errorpage.png" alt="Error" class="w-64 md:w-56 mx-auto mb-6 opacity-80">

    <h1 class="text-3xl font-black text-gray-800 mb-4 italic uppercase">Something Went Wrong!</h1>

    <p class="text-lg font-bold text-gray-600 mb-8 leading-relaxed">
        죄송합니다. 예상치 못한 오류가 발생하여 <br>
        요청하신 페이지를 표시할 수 없습니다.
    </p>

    <div class="text-xs text-gray-400 mb-10 p-3 bg-gray-50 rounded-lg">
        Error Type: <span th:text="${status}">Unknown</span> <br>
        Timestamp: <span th:text="${#dates.format(#dates.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></span>
    </div>

    <div class="flex gap-4 justify-center">
        <a href="/" class="px-8 py-3 bg-[#FFB74D] text-white rounded-full font-black shadow-md hover:bg-[#ffa726] transition">
            메인으로 이동
        </a>
        <button onclick="history.back()" class="px-8 py-3 border-2 border-gray-200 text-gray-500 rounded-full font-black hover:bg-gray-50 transition">
            이전 페이지
        </button>
    </div>
</div>
</body>
</html>
