<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Pick Meal - Access Denied</title>
    <link rel="icon" href="/images/pickmeal_favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fredoka', sans-serif; background-color: #fffaf8; }
        .italic-text { font-style: italic !important; }

</head>
<body class="flex flex-col items-center justify-center h-screen text-center bg-slate-50">

    </p>
    <div class="flex gap-3 justify-center">
        <a href="/users/login" class="px-6 py-2.5 bg-slate-800 text-white rounded-lg font-medium hover:bg-slate-700 transition">로그인 페이지</a>
        <button onclick="history.back()" class="px-6 py-2.5 border border-slate-300 text-slate-600 rounded-lg font-medium hover:bg-slate-50">이전으로</button>
