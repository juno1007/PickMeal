<!DOCTYPE html>
<html lang="ko"xmlns:th="http://www.thymeleaf.org"
               xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pick Meal - Write Post</title>
  <link rel="icon" href="/images/pickmeal_favicon.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/lang/summernote-ko-KR.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700;800&family=Jua&family=Nanum+Gothic:wght@700;800&family=Gamja+Flower&family=Black+Han+Sans&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/post/write.css">

  <meta name="_csrf" th:content="${_csrf?.token}" th:if="${_csrf}"/>
  <meta name="_csrf_header" th:content="${_csrf?.headerName}" th:if="${_csrf}"/>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
   body {
       font-family: 'Fredoka', 'Jua', sans-serif !important;
       background-color: #FFF5F0;
       margin: 0;
       overflow: hidden;
       height: 100vh;
       display: flex;
       flex-direction: column;
   }

    h1, h2, h3, h4, h5, h6, p, span, div, button, a, label, input, select, textarea {
            font-family: 'Fredoka', 'Jua', sans-serif !important;
            font-style: normal !important;
        }

   .nav-link { font-family: 'Fredoka', 'Jua', sans-serif; font-weight: 700; font-style: italic; }

   .content-slide-up {
       animation: slideUp 0.8s cubic-bezier(0.65, 0, 0.35, 1) forwards;
       will-change: transform, opacity;
   }

   @keyframes slideUp {
       from { transform: translateY(100px); opacity: 0; }
       to { transform: translateY(0); opacity: 1; }
   }

   .write-card {
       border-radius: 3rem;
       background: white;
       box-shadow: 0 20px 50px rgba(0,0,0,0.1);
   }

   /* 툴바 드롭다운 스타일 최적화 */
   .toolbar-btn {
       background-color: #FFF5EF;
       color: #FF8A5B;
       padding: 0.5rem 0.8rem;
       border-radius: 0.8rem;
       font-weight: 800;
       transition: all 0.2s;
       font-size: 0.8rem;
       border: none;
       outline: none;
       cursor: pointer;
   }
   .toolbar-btn:hover {
       background-color: #FF8A5B;
       color: white;
   }

   .input-field {
       border-radius: 1.5rem;
       transition: all 0.3s;
       border: 2px solid #FDF5E6;
       width: 100%;
   }

   .input-field:focus {
       border-color: #FF8A5B;
       outline: none;
       background: white;
   }

   header, header *, .italic-text { font-style: italic !important; }

   textarea.input-field {
       resize: none;
       height: 300px;
       font-family: 'Fredoka', sans-serif;
   }

   /* 🍊🍊 썸머노트를 쓰기위한 커스텀 css. 바꾸려면 이 부분을 바꿔야함! 🍊🍊 */
   /* 에디터 전체 테두리 없애고 깔끔하게 */
   .note-editor.note-frame {
       border: none !important;
       box-shadow: none !important;
   }

   /* 툴바 영역 배경색과 둥근 테두리 설정 (기존 디자인 유지) */
   .note-toolbar {
       background-color: #FDF5E6 !important; /* 연한 오렌지색 배경 */
       border-radius: 1.2rem !important;
       padding: 0.8rem !important;
       border-bottom: none !important;
       display: flex;
       flex-wrap: wrap;
       gap: 5px;
   }

   /* 툴바 버튼 그룹핑 박스 투명하게 */
   .note-btn-group {
       background: transparent !important;
       border: none !important;
       margin-right: 5px !important;
   }

   /* 툴바 버튼 기본 스타일 (둥글고 오렌지색 글씨) */
   .note-btn {
       background-color: #FFF5EF !important;
       color: #FF8A5B !important; /* 오렌지색 포인트 */
       border: none !important;
       border-radius: 0.8rem !important;
       padding: 0.6rem 0.9rem !important;
       font-weight: 800 !important;
       transition: all 0.2s !important;
       box-shadow: none !important;
   }

   /* 버튼에 마우스 올렸을 때 & 클릭되었을 때 (활성화) */
   .note-btn:hover, .note-btn.active {
       background-color: #FF8A5B !important;
       color: white !important;
   }

   /* 드롭다운 메뉴 스타일 (폰트/크기 선택창) */
   .note-dropdown-menu {
       border-radius: 1rem !important;
       border: 2px solid #FDF5E6 !important;
       padding: 0.5rem !important;
       box-shadow: 0 10px 30px rgba(0,0,0,0.1) !important;
   }
   /* 드롭다운 항목 호버 효과 */
   .note-dropdown-item:hover {
       background-color: #FFF5EF !important;
       color: #FF8A5B !important;
       border-radius: 0.5rem;
   }

   /* 글쓰기 본문 영역 스타일 */
   .note-editable {
       background-color: #FAFAFA !important; /* 아주 연한 회색 배경 */
       border-radius: 1.5rem !important;
       border: 2px solid #FDF5E6 !important;
       padding: 2rem !important;
       font-family: 'Fredoka', sans-serif; /* 기본 폰트 설정 */
       font-size: 20px;
       font-weight: bold;
       color: #444;
       line-height: 1.8 !important;
       min-height: 400px; /* 최소 높이 확보 */
   }
   /* 본문 영역 포커스 됐을 때 (주황색 테두리) */
   .note-editor.note-frame .note-editing-area .note-editable:focus {
       border-color: #FF8A5B !important;
       outline: none !important;
   }

   /* 상태바 (맨 아래 resize bar) 숨기기 */
   .note-statusbar {
       display: none !important;
   }

   /* Placeholder 스타일 */
   .note-placeholder {
       color: #ccc !important;
       font-family: 'Fredoka', 'Jua',  sans-serif !important;
       font-weight: bold !important;
       padding: 2rem !important;
       font-size: 20px !important;
   }

   .note-editable ul {
   list-style-type: disc !important;
   list-style-position: inside !important;
   padding-left: 20px !important;
   margin-bottom: 10px !important;
   }

   .note-editable ol {
       list-style-type: decimal !important;
       list-style-position: inside !important;
       padding-left: 20px !important;
       margin-bottom: 10px !important;
   }
  </style>
</head>
<body>

<div class="overflow-y-auto flex-grow" >
  <header th:replace="~{fragments/header :: headerFragment}"></header>
  <main class="flex items-center justify-center content-slide-up py-10">
    <div class="write-card p-12 w-full max-w-4xl mx-4 border-2 border-gray-50">
      <div class="mb-8 text-center md:text-left">
        <h2 class="text-4xl font-black text-[#FF8A5B] italic uppercase tracking-tighter">새 게시물</h2>
        <p class="text-gray-400 font-bold italic">자신만의 스타일로 취향을 표현하세요!</p>
      </div>

      <form id="writeForm" th:action="@{/board/write}" method="post" enctype="multipart/form-data" class="space-y-6">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="space-y-2">
          <label for = "postTitle" class="font-black text-gray-700 italic ml-2 uppercase text-sm">Title</label>
          <input type="text" id="postTitle" name="title" placeholder="제목" class="input-field px-6 py-4 bg-gray-50 font-bold" required>
        </div>

        <div class="mb-6" sec:authorize="hasRole('ADMIN')">
          <label class="flex items-center space-x-3 cursor-pointer">
            <input type="checkbox" name="is_notice" value="Y"
                   class="w-5 h-5 text-[#FF8A5B] border-2 border-[#FDF5E6] rounded focus:ring-[#FF8A5B]">
            <span class="text-[#FF8A5B] font-bold italic uppercase">📢 Post as Notice</span>
          </label>
        </div>
        <div class="space-y-2">
          <label class="font-black text-gray-700 italic ml-2 uppercase text-sm">Content Editor</label>

          <textarea id="postContent" placeholder="글 작성" name="content" class="input-field px-6 py-6 bg-gray-50 font-bold leading-relaxed" style="font-size: 20px;" required></textarea>
        </div>

        <div class="flex gap-4 pt-6">
          <button type="button" onclick="location.href='/board'" class="flex-1 bg-gray-100 text-gray-400 py-4 rounded-full font-black text-xl shadow-sm hover:bg-gray-200 transition italic uppercase active:scale-95">
            취소
          </button>
          <button type="submit" class="flex-[2] bg-[#FF8A5B] text-white py-4 rounded-full font-black text-xl shadow-lg hover:scale-105 transition italic uppercase active:scale-95">
            저장
          </button>
        </div>
      </form>
    </div>
  </main>
  <footer th:replace="~{fragments/footer :: footerFragment}"></footer>
</div>

<script>

  // 썸머노트 사용!!!! 🍊🍊🍊🍊🍊

  $(document).ready(function() {
        // 1. 썸머노트 에디터 실행 (옵션 설정)
        $('#postContent').summernote({
            height: 500,                 // 에디터 높이
            lang: "ko-KR",               // 한글 설정
            placeholder: '당신의 맛있는 경험을 자유롭게 적어주세요!',
            disableResizeEditor: true,   // 크기 조절 바 숨기기

            dialogsInBody: true,

            // 🌟 툴바 버튼 구성을 내 맘대로 편집! (원래 있던 기능들과 비슷하게)
            toolbar: [
                // [그룹명, [버튼목록]]
                ['font', ['fontname', 'fontsize']], // 폰트, 크기 설정
                ['style', ['bold', 'italic', 'underline', 'clear']], // 굵게, 기울임, 밑줄, 지우기
                ['color', ['color']], // 글자색
                ['para', ['ul', 'ol', 'paragraph']], // 문단 정렬 (왼쪽, 가운데, 오른쪽 등)
                ['insert', ['picture', 'link']], // 사진 첨부, 링크
                ['view', ['fullscreen', 'codeview', 'help']] // 전체화면, 코드보기
            ],

            // 사용할 폰트 목록 추가
            fontNames: ['Fredoka', 'Jua', 'Nanum Gothic', 'Gamja Flower', 'Black Han Sans', 'Arial'],
            fontNamesIgnoreCheck: ['Fredoka', 'Jua', 'Nanum Gothic', 'Gamja Flower', 'Black Han Sans'],

            // S3 이미지 업로드 콜백 함수 연결
            callbacks: {
                onImageUpload: function(files) {
                    for (let i = 0; i < files.length; i++) {
                        uploadImageToS3(files[i], this);
                    }
                }
            }
        });
    });

 // 🌟 우리가 만든 백엔드 API로 사진을 보내고 S3 주소를 받아오는 함수
function uploadImageToS3(file, editor) {
    let data = new FormData();
    data.append("file", file); // 백엔드의 @RequestParam("file") 과 이름이 같아야 함!

    const csrfToken = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

    $.ajax({
        data: data,
        type: "POST",
        url: "/file/upload", // 백엔드 컨트롤러 주소
        contentType: false,
        processData: false,
        beforeSend: function(xhr) {
            xhr.setRequestHeader(csrfHeader, csrfToken);
        },
        success: function(s3ImageUrl) {
            $(editor).summernote('insertImage', s3ImageUrl);
        },
        error: function(error) {
            console.error("이미지 업로드 실패:", error);
            alert("이미지 업로드에 실패했습니다. 다시 시도해 주세요.");
        }
    });
}

</script>
</body>
</html>
