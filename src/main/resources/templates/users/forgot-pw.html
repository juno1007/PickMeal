<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pick Meal - Forgot Password</title>
  <link rel="icon" href="/images/pickmeal_favicon.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700;800&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
    body {
            font-family: 'Fredoka', 'Jua', sans-serif !important;
            background-color: #FFF5F0;
            margin: 0;

            /* 기존 height: 100vh; 와 overflow: hidden; 을 아래 코드로 교체합니다 */
            min-height: 100vh; /* 창 크기를 줄이면 자연스럽게 세로 스크롤바가 생성되도록 최소 높이만 보장 */
            display: flex;
            flex-direction: column;
            overflow-x: hidden; /* 가로로 삐져나오는 것만 잘라내고, 세로 스크롤은 허용 */
        }

    h1, h2, h3, h4, h5, h6, p, span, div, button, a, label, input, select, textarea {
            font-family: 'Fredoka', 'Jua', sans-serif !important;
            font-style: normal !important;
        }

       header .text-3xl,
        header .nav-link,
        header button,
        header a,
        .nav-link {
            font-family: 'Fredoka', 'Jua', sans-serif !important;
            font-weight: 800 !important;
            font-style: italic !important;
        }

    .nav-link { font-family: 'Fredoka', 'Jua', sans-serif; font-weight: 700; font-style: italic; }

    /* [통일된 애니메이션] 콘텐츠 영역 전용 상승 효과 */
    .content-slide-up {
        animation: slideUp 0.8s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        will-change: transform, opacity;
    }

    @keyframes slideUp {
        from { transform: translateY(100px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    .forgot-card { border-radius: 3rem; background: white; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
    .input-field { border-radius: 1.2rem; transition: all 0.3s; border: 2px solid #FDF5E6; width: 100%; }
    .input-field:focus { border-color: #FF8A5B; outline: none; background: white; }

    .btn-primary { background-color: #FF8A5B; transition: all 0.3s; }
    .btn-primary:hover { background-color: #e67a4d; transform: scale(1.02); }

    .btn-check {
        background-color: #FF8A5B;
        color: white;
        font-weight: 800;
        border-radius: 1.2rem;
        padding: 0 1.5rem;
        white-space: nowrap;
        transition: all 0.3s;
        flex-shrink: 0;
    }
  </style>
</head>
<body>
<header th:replace="~{fragments/header :: headerFragment}"></header>

<main class="flex-grow flex items-start justify-center content-slide-up px-4 pt-32 pb-10">
  <div class="forgot-card p-12 w-full max-w-lg text-center mx-4 border-2 border-gray-50">
    <h2 class="text-4xl font-black text-[#FF8A5B] italic mb-2 uppercase tracking-tighter">비밀번호 찾기</h2>
    <p class="text-gray-400 font-bold mb-10 italic">당신의 ID와 EMAIL을 입력해주세요</p>

    <form id="forgotForm" class="space-y-6 text-left">
      <div class="space-y-2">
        <label class="font-black text-gray-700 italic ml-2 uppercase text-sm">ID 입력</label>
        <input type="text" id="userId" placeholder="ID" class="input-field px-6 py-4 bg-gray-50 font-bold" required>
      </div>

      <div class="space-y-2">
        <label class="font-black text-gray-700 italic ml-2 uppercase text-sm">이메일 인증</label>
        <div class="flex gap-2">
          <input type="email" id="userEmail" placeholder="EMAIL" class="input-field px-6 py-4 bg-gray-50 font-bold" required>
        </div>
      </div>

      <button type="submit" class="btn-primary w-full text-white py-5 rounded-full font-black text-xl shadow-lg transition italic uppercase active:scale-95 mt-4">
        링크 보내기
      </button>
    </form>

    <div class="mt-8 text-sm font-bold text-gray-400 italic">
      비밀번호가 기억나셨나요?
      <a href="/login" class="text-[#FF8A5B] hover:underline ml-1">로그인으로 돌아가기</a>
    </div>
  </div>
</main>

<script>
  document.getElementById('forgotForm').addEventListener('submit', async function(e) {
      e.preventDefault(); // 기본 폼 제출 방지

      const id = document.getElementById('userId').value;
      const email = document.getElementById('userEmail').value;

      try {
          // 백엔드 컨트롤러(@PostMapping("/find-password/send-link"))로 데이터 전송
          const response = await fetch('/users/find-password/send-link', {
              method: 'POST',
              headers: {
                  'Content-Type': 'application/x-www-form-urlencoded',
              },
              body: new URLSearchParams({
                  'id': id,
                  'email': email
              })
          });

          const result = await response.text();

          if (result === 'success') {
              alert("비밀번호 재설정 링크가 이메일로 전송되었습니다. 확인 후 비밀번호를 변경해 주세요! ✨");
              location.href = '/login'; // 성공 시 로그인 페이지로 이동
          } else if (result === 'not_found') {
              alert("입력하신 아이디와 이메일 정보가 일치하는 회원이 없습니다. ❌");
          } else {
              alert("메일 발송 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요. 😢");
          }
      } catch (error) {
          console.error('Error:', error);
          alert("서버와 통신 중 문제가 발생했습니다.");
      }
  });

  // (참고) 만약 'Verify' 버튼이 단순히 이메일 형식을 체크하는 용도라면 아래처럼 남겨둘 수 있습니다.
  function verifyEmail() {
      const email = document.getElementById('userEmail').value;
      if(!email.includes('@')) {
          alert("올바른 이메일 형식을 입력해 주세요! 📧");
      } else {
          alert("입력하신 이메일 형식이 확인되었습니다. 하단의 Send 버튼을 눌러주세요.");
      }
  }
</script>
<footer th:replace="~{fragments/footer :: footerFragment}"></footer>
</body>
</html>
