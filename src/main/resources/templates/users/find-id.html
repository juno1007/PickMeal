<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pick Meal - 아이디 찾기</title>
    <link rel="icon" href="/images/pickmeal_favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700;800&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        body {
            font-family: 'Fredoka', 'Jua', sans-serif !important;
            background-color: #FFF5F0;
            margin: 0;

            /* 기존 height: 100vh; 와 overflow: hidden; 을 아래 코드로 교체합니다 */
            min-height: 100vh; /* 창 크기를 줄이면 자연스럽게 세로 스크롤바가 생성되도록 최소 높이만 보장 */
            display: flex;
            flex-direction: column;
            overflow-x: hidden; /* 가로로 삐져나오는 것만 잘라내고, 세로 스크롤은 허용 */
        }
        .card { border-radius: 3rem; background: white; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .input-field { border-radius: 1.2rem; border: 2px solid #FDF5E6; width: 100%; padding: 1rem 1.5rem; font-weight: 700; transition: all 0.3s; }
        .input-field:focus { outline: none; border-color: #FF8A5B; background-color: white; box-shadow: 0 0 0 4px rgba(255, 138, 91, 0.1); }
        .btn-submit { background-color: #FF8A5B; color: white; font-weight: 800; border-radius: 1.2rem; transition: all 0.3s; }
        .btn-submit:hover { background-color: #e67a4d; transform: translateY(-2px); }

        h1, h2, h3, h4, h5, h6, p, span, div, button, a, label, input, select, textarea {
            font-family: 'Fredoka', 'Jua', sans-serif !important;
            font-style: normal !important;
        }

       header .text-3xl,
        header .nav-link,
        header button,
        header a,
        .nav-link {
            font-family: 'Fredoka', 'Jua', sans-serif !important;
            font-weight: 800 !important;
            font-style: italic !important;
        }

        /* 부드럽게 나타나는 애니메이션 */
        .content-slide-up {
            animation: slideUp 0.8s cubic-bezier(0.65, 0, 0.35, 1) forwards;
            will-change: transform, opacity;
        }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
</head>

<body>
<header th:replace="~{fragments/header :: headerFragment}"></header>

<main class="flex-grow flex items-start justify-center content-slide-up px-4 pt-32 pb-10">
    <div class="card p-12 w-full max-w-md text-center border-2 border-gray-50">
        <h2 class="text-4xl font-black text-[#FF8A5B] italic mb-6 uppercase tracking-tighter">ID 찾기</h2>

        <div class="space-y-4 text-left">
            <div>
                <label class="text-xs font-bold text-gray-400 ml-2 uppercase">Name</label>
                <input type="text" id="userName" placeholder="가입하신 이름" class="input-field">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 ml-2 uppercase">Email</label>
                <input type="email" id="userEmail" placeholder="가입하신 이메일" class="input-field">
            </div>
            <button onclick="handleFindId()" class="btn-submit w-full py-4 mt-4 uppercase active:scale-95">찾기</button>
        </div>

        <div id="resultArea" class="hidden mt-8 p-6 bg-orange-50 rounded-3xl border-2 border-dashed border-[#FF8A5B]">
            <p id="resultTitle" class="text-sm font-bold text-gray-500 mb-2">찾으시는 아이디는</p>
            <p id="foundId" class="text-xl font-black text-[#FF8A5B] my-2 leading-tight"></p>

            <div id="actionButtons" class="mt-4 pt-4 border-t border-orange-200 flex justify-center gap-4">
                <a href="/users/login" class="text-xs font-bold text-gray-400 hover:text-[#FF8A5B] underline uppercase">로그인</a>
                <a id="findPwBtn" href="/users/forgot-pw" class="hidden text-xs font-bold text-gray-400 hover:text-[#FF8A5B] underline uppercase">비밀번호 찾기</a>
            </div>
        </div>

        <div class="mt-8 text-xs font-bold text-gray-400 uppercase tracking-widest">
            <a href="/users/login" class="hover:text-[#FF8A5B] transition">로그인으로 돌아가기</a>
        </div>
    </div>
</main>

<script>
    async function handleFindId() {
        const name = document.getElementById('userName').value.trim();
        const email = document.getElementById('userEmail').value.trim();
        const resultArea = document.getElementById('resultArea');
        const foundIdText = document.getElementById('foundId');
        const resultTitle = document.getElementById('resultTitle');
        const findPwBtn = document.getElementById('findPwBtn');

        if(!name || !email) return alert("이름과 이메일을 모두 입력해주세요! 😊");

        try {
            const response = await fetch('/users/find-id', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ name: name, email: email })
            });

            if(response.ok) {
                const result = await response.text();

                resultArea.classList.add('hidden');
                resultArea.classList.remove('content-slide-up');

                if (result.startsWith("SOCIAL_")) {
                    const siteName = result.split("_")[1];
                    resultTitle.innerText = "가입 정보를 확인했습니다! ✨";
                    foundIdText.innerHTML = `해당 계정은 <span class="text-blue-500 underline">${siteName}</span> 계정으로<br>연동되어 있습니다.`;
                    findPwBtn.classList.add('hidden'); // 소셜 계정은 비번찾기 숨김
                } else {
                    resultTitle.innerText = "찾으시는 아이디는";
                    foundIdText.innerText = result;
                    findPwBtn.classList.remove('hidden'); // 일반 계정은 비번찾기 보임
                }

                resultArea.classList.remove('hidden');
                void resultArea.offsetWidth;
                resultArea.classList.add('content-slide-up');

            } else if(response.status === 404) {
                alert("일치하는 회원 정보가 없습니다. 😢");
                resultArea.classList.add('hidden');
            }
        } catch(e) {
            alert("서버 통신 중 오류가 발생했습니다.");
        }
    }
</script>
<footer th:replace="~{fragments/footer :: footerFragment}"></footer>
</body>
</html>
