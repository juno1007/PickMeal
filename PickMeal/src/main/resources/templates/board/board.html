<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick Meal - Community Board</title>
    <link rel="icon" href="/images/pickmeal_favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700;800&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        /* [공통] 폰트 및 배경 설정 */
        body {
            font-family: 'Fredoka', 'Jua', sans-serif;
            background-color: #FFF5F0;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, h6, p, span, div, button, a, select, input, textarea, th, td { font-style: normal !important; }

        /* [핵심] 헤더 디자인 고정 */
        header .text-3xl,
        header .nav-link,
        header button,
        header a {
            font-family: 'Fredoka', 'Jua', sans-serif !important;
            font-weight: 800 !important;
            font-style: italic !important;
        }

        /* [애니메이션] 콘텐츠 상승 효과 */
        .content-slide-up {
            animation: slideUp 0.8s cubic-bezier(0.65, 0, 0.35, 1) forwards;
            will-change: transform, opacity;
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* [보드 전용] 카드 스타일 */
        .board-card {
            border-radius: 2.5rem;
            background: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            border: 2px solid #FDF5E6;
            overflow: hidden;
        }

        .board-row { transition: background-color 0.2s; cursor: pointer; }
        .board-row:hover { background-color: #FFF5F0; }

        /* 공지사항 전용 스타일 */
        .notice-row { background-color: #FFF9F5; }
        .notice-row:hover { background-color: #FFEEE5; }

        th { white-space: nowrap; }

        .overflow-x-auto::-webkit-scrollbar { height: 8px; }
        .overflow-x-auto::-webkit-scrollbar-thumb { background-color: #FF8A5B; border-radius: 10px; }
    </style>
</head>
<body>

<header th:replace="~{fragments/header :: headerFragment}"></header>

<main class="flex-grow flex flex-col items-center justify-start pt-32 pb-20 content-slide-up px-10">
    <div class="max-w-7xl w-full">
        <div class="flex flex-col md:flex-row justify-between items-center md:items-end mb-8 gap-6">
            <div class="text-center md:text-left">
                <h2 class="text-5xl font-black text-[#FF8A5B] italic uppercase tracking-tighter mb-2">커뮤니티 게시판</h2>
                <p class="text-[#FF8A5B] font-bold italic">당신의 맛있는 경험을 공유해보세요!</p>
            </div>

            <div sec:authorize="isAuthenticated()">
                <button onclick="location.href='/board/write'"
                        class="bg-[#FF8A5B] text-white px-10 py-4 rounded-full font-black shadow-lg hover:bg-[#e67a4d] transition-all italic uppercase active:scale-95">
                    글쓰기
                </button>
            </div>
            <div sec:authorize="isAnonymous()">
                <p class="text-gray-400 font-bold italic bg-white px-6 py-3 rounded-full shadow-sm">
                     <a href="/users/login" class="text-[#FF8A5B] no-underline hover:underline">로그인</a>해서 글을 작성해 보세요!
                </p>
            </div>
        </div>

        <div class="board-card overflow-x-auto shadow-lg">
            <table class="w-full text-left border-collapse min-w-[800px]">
                <thead>
                <tr class="bg-gray-50 border-b-2 border-[#FDF5E6]">
                    <th class="px-6 py-5 text-[#FF8A5B] italic font-black text-sm uppercase text-center w-20">번호</th>
                    <th class="px-4 py-5 text-[#FF8A5B] italic font-black text-sm uppercase text-center w-20">사진</th>
                    <th class="px-8 py-5 text-[#FF8A5B] italic font-black text-sm uppercase">제목</th>
                    <th class="px-6 py-5 text-[#FF8A5B] italic font-black text-sm uppercase text-center w-32">글쓴이</th>
                    <th class="px-6 py-5 text-[#FF8A5B] italic font-black text-sm uppercase text-center w-32">날짜</th>
                    <th class="px-4 py-5 text-[#FF8A5B] italic font-black text-sm uppercase text-center w-24">조회수</th>
                    <th class="px-4 py-5 text-[#FF8A5B] italic font-black text-sm uppercase text-center w-24">좋아요</th>
                </tr>
                </thead>
                <tbody class="text-gray-700 font-bold">
                <tr th:each="notice : ${notices}" class="notice-row border-b border-orange-100"
                    th:onclick="|location.href='@{/board/detail/{id}(id=${notice.boardId})}'|">
                    <td class="px-6 py-6 text-center">
                        <span class="bg-[#FF8A5B] text-white text-[10px] px-2 py-1 rounded-md font-black uppercase">Notice</span>
                    </td>
                    <td th:if="${#strings.contains(notice.content, '<img')}" class="px-4 py-6 text-center text-xl">🖼️</td>
                    <td th:unless="${#strings.contains(notice.content, '<img')}" class="px-4 py-6 text-center text-xl"></td>
                    <td class="px-8 py-6">
                        <div class="whitespace-nowrap overflow-hidden text-ellipsis max-w-[300px] lg:max-w-none">
                            <span class="text-[#FF8A5B] hover:underline cursor-pointer" th:text="${notice.title}">공지사항 제목</span>
                        </div>
                    </td>
                    <td class="px-6 py-6 text-center text-sm text-gray-600 italic whitespace-nowrap" th:text="${notice.nickname}">Admin</td>
                    <td class="px-6 py-6 text-center text-xs text-gray-400 whitespace-nowrap" th:text="${#dates.format(notice.createDate, 'yyyy-MM-dd')}">2026-03-03</td>
                    <td class="px-4 py-6 text-center text-sm" th:text="${notice.viewCount}">0</td>
                    <td class="px-4 py-6 text-center text-sm text-red-400 whitespace-nowrap" th:text="'❤️ ' + ${notice.likeCount}">❤️ 0</td>
                </tr>

                <tr th:each="board : ${boards}" class="board-row border-b border-gray-100"
                    th:onclick="|location.href='@{/board/detail/{id}(id=${board.boardId})}'|">
                    <td class="px-6 py-6 text-center text-gray-400 text-sm" th:text="${board.boardId}">01</td>
                    <td th:if="${#strings.contains(board.content, '<img')}" class="px-4 py-6 text-center text-xl">🖼️</td>
                    <td th:unless="${#strings.contains(board.content, '<img')}" class="px-4 py-6 text-center text-xl"></td>
                    <td class="px-8 py-6">
                        <div class="whitespace-nowrap overflow-hidden text-ellipsis max-w-[300px] lg:max-w-none">
                            <span class="hover:underline cursor-pointer" th:text="${board.title}">게시글 제목</span>
                            <span class="text-[#FF8A5B] text-sm ml-2" th:if="${board.commentCount > 0}" th:text="'[' + ${board.commentCount} + ']'">[0]</span>
                        </div>
                    </td>
                    <td class="px-6 py-6 text-center text-sm text-gray-600 italic whitespace-nowrap" th:text="${board.nickname}">Author</td>
                    <td class="px-6 py-6 text-center text-xs text-gray-400 whitespace-nowrap" th:text="${#dates.format(board.createDate, 'yyyy-MM-dd')}">2026-02-13</td>
                    <td class="px-4 py-6 text-center text-sm" th:text="${board.viewCount}">0</td>
                    <td class="px-4 py-6 text-center text-sm text-red-400 whitespace-nowrap" th:text="'❤️ ' + ${board.likeCount}">❤️ 0</td>
                </tr>
                </tbody>
            </table>

            <nav th:if="${boards.totalPages > 0}" aria-label="Page navigation" class="py-6">
                <ul class="flex justify-center gap-2">
                    <li th:classappend="${boards.first} ? 'opacity-50 pointer-events-none'">
                        <a class="px-4 py-2 rounded-full bg-white border border-gray-200 text-gray-600 hover:bg-[#FF8A5B] hover:text-white transition font-bold"
                           th:href="@{/board/list(page=${boards.number-1}, searchType=${param.searchType}, keyword=${param.keyword})}">
                            <span>&laquo;</span>
                        </a>
                    </li>

                    <li th:each="page: ${#numbers.sequence(0, boards.totalPages-1)}"
                        th:classappend="${page == boards.number} ? 'active'">
                        <a class="px-4 py-2 rounded-full border transition font-bold"
                           th:classappend="${page == boards.number} ? 'bg-[#FF8A5B] text-white border-[#FF8A5B]' : 'bg-white border-gray-200 text-gray-600 hover:bg-[#FF8A5B] hover:text-white'"
                           th:href="@{/board/list(page=${page}, searchType=${param.searchType}, keyword=${param.keyword})}"
                           th:text="${page+1}"></a>
                    </li>

                    <li th:classappend="${boards.last} ? 'opacity-50 pointer-events-none'">
                        <a class="px-4 py-2 rounded-full bg-white border border-gray-200 text-gray-600 hover:bg-[#FF8A5B] hover:text-white transition font-bold"
                           th:href="@{/board/list(page=${boards.number+1}, searchType=${param.searchType}, keyword=${param.keyword})}">
                            <span>&raquo;</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="flex justify-center mt-10 mb-20">
                <form th:action="@{/board/list}" method="get"
                      class="flex items-center gap-2 bg-white p-1.5 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.12)] border-2 border-[#FFD8C2]">

                    <div class="relative">
                        <select name="searchType"
                                class="bg-orange-50 pl-6 pr-4 py-2.5 rounded-l-full font-bold text-gray-700 outline-none cursor-pointer hover:bg-orange-100 transition-colors appearance-none">
                            <option value="title_content" th:selected="${param.searchType == 'title_content'}">제목+내용</option>
                            <option value="title" th:selected="${param.searchType == 'title'}">제목</option>
                            <option value="content" th:selected="${param.searchType == 'content'}">내용</option>
                            <option value="nickname" th:selected="${param.searchType == 'nickname'}">작성자</option>
                        </select>
                    </div>

                    <div class="w-px h-6 bg-orange-200"></div>

                    <input type="text" name="keyword" th:value="${param.keyword}"
                           placeholder="검색어를 입력하세요!"
                           class="px-5 py-2.5 w-72 outline-none text-gray-700 placeholder-gray-400 bg-transparent font-medium">

                    <button type="submit"
                            class="bg-[#FF8A5B] text-white px-8 py-2.5 rounded-full font-black hover:bg-[#ff7a45] transition-all transform hover:scale-105 shadow-md active:scale-95">
                        검색
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footerFragment}"></footer>

</body>
</html>
