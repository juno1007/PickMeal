<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick Meal - 인기 랭킹</title>
    <link rel="icon" href="/images/pickmeal_favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700;800&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        /* 룰렛창 기반 레이아웃 엔진 */
        body {
            font-family: 'Fredoka', 'Jua', sans-serif !important;
            background-color: #FFF5F0;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header, footer { z-index: 1200 !important; position: relative; }

        h1, h2, h3, h4, h5, h6, p, span, div, button, a, label, input, select {
            font-family: 'Fredoka', 'Jua', sans-serif !important;
            font-style: normal !important;
        }

        .nav-link {
            font-family: 'Fredoka','Jua', sans-serif !important;
            font-weight: 700 !important;
            font-style: italic !important;
            display: inline-block !important;
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 100px;
            padding-bottom: 40px;
            box-sizing: border-box;
        }

        .ranking-card {
            border-radius: 3rem;
            background: white;
            box-shadow: 0 20px 50px rgba(255, 138, 91, 0.1);
            width: 100%;
            max-width: 900px;
        }

        .content-slide-up {
            animation: slideUp 0.8s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

<header th:replace="~{fragments/header :: headerFragment}"></header>

<main class="content-slide-up px-6 md:px-12">
    <div class="ranking-card p-8 md:p-12">
        <h1 class="text-5xl font-black text-[#FF8A5B] italic text-center mb-10 uppercase tracking-tighter">
            🏆 TOP 10 RANKING 🏆
        </h1>

        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="border-b-2 border-[#FFF5F0]">
                <tr class="text-[#FF8A5B] font-black italic uppercase text-lg">
                    <th class="py-4 px-2">Rank</th>
                    <th class="py-4 px-2 text-center">Photo</th>
                    <th class="py-4 px-2">Menu</th>
                    <th class="py-4 px-2 text-right">Wins</th>
                </tr>
                </thead>
                <tbody id="ranking-tbody" class="divide-y divide-gray-50">
                <tr th:each="food, iterStat : ${rankingList}"
                    th:classappend="${iterStat.count == 1} ? 'bg-orange-50' : ''"
                    class="hover:bg-orange-100 transition-colors group">

                    <td class="py-6 px-2 font-black italic text-3xl text-gray-300 transition-all duration-300"
                        th:classappend="${iterStat.count == 1} ? 'text-[#FF8A5B] scale-110' : 'group-hover:text-[#FF8A5B]'">
                        <span th:if="${iterStat.count == 1}">🥇</span>
                        <span th:if="${iterStat.count == 2}">🥈</span>
                        <span th:if="${iterStat.count == 3}">🥉</span>
                        [[${iterStat.count}]]
                    </td>

                    <td class="py-4 px-2 flex justify-center">
                        <div class="w-20 h-20 rounded-2xl overflow-hidden shadow-md group-hover:rotate-3 transition-transform">
                            <img th:src="${food.imagePath}" class="w-full h-full object-cover">
                        </div>
                    </td>

                    <td class="py-4 px-2 font-black text-gray-700 text-xl italic cursor-pointer hover:text-[#FF8A5B] transition-all"
                        th:attr="data-name=${food.foodName}"
                        onclick="openMap(this)">
                        [[${food.foodName}]]
                    </td>

                    <td class="py-4 px-2 text-right font-black text-[#FF8A5B] italic text-2xl group-hover:scale-110 transition-transform">
                        [[${food.winCount}]] <span class="text-sm">회</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div id="pagination" class="flex justify-center items-center gap-2 mt-8"></div>

        <div class="mt-12 flex flex-col md:flex-row justify-center items-center gap-4 max-w-2xl mx-auto">
            <button onclick="location.href='/next-page'"
                    class="w-full md:w-auto px-10 py-4 bg-[#FF8A5B] text-white rounded-full font-black text-xl shadow-lg hover:scale-105 transition-all italic uppercase">
                Home 🏠
            </button>

            <button onclick="window.shareRanking()"
                    class="w-full md:w-auto px-10 py-4 bg-[#FF8A5B] text-white rounded-full font-black text-xl shadow-lg hover:scale-105 hover:bg-[#ff7a45] transition-all flex items-center justify-center gap-3 italic uppercase">
                Share 🔗
            </button>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footerFragment}"></footer>

<script>
    function openMap(element) {
        const foodName = element.getAttribute('data-name');
        const mapUrl = 'https://map.kakao.com/link/search/' + encodeURIComponent(foodName);
        window.open(mapUrl);
    }

    window.shareRanking = function() {
        const currentUrl = window.location.origin + "/worldcup/ranking";
        navigator.clipboard.writeText(currentUrl).then(() => {
            alert("✨ 랭킹 주소가 복사되었습니다!");
        });
    };

    // [핵심] 프론트엔드 페이징 스크립트 추가
    document.addEventListener("DOMContentLoaded", function() {
        const rowsPerPage = 5; // 한 번에 보여줄 행 개수
        const tbody = document.getElementById('ranking-tbody');
        const rows = tbody.querySelectorAll('tr');
        const totalPages = Math.ceil(rows.length / rowsPerPage);
        const paginationContainer = document.getElementById('pagination');

        if (rows.length === 0) return;

        function showPage(page) {
            // 모든 행을 돌면서 현재 페이지에 해당하는 것만 보이기
            rows.forEach((row, index) => {
                row.style.display = (index >= (page - 1) * rowsPerPage && index < page * rowsPerPage) ? '' : 'none';
            });

            // 페이지 버튼 새로 그리기
            paginationContainer.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;

                // 현재 선택된 페이지 버튼 디자인
                if (i === page) {
                    btn.className = "w-10 h-10 rounded-full font-black text-lg bg-[#FF8A5B] text-white shadow-md transform scale-110 transition-all";
                }
                // 다른 페이지 버튼 디자인
                else {
                    btn.className = "w-10 h-10 rounded-full font-black text-lg bg-orange-100 text-orange-400 hover:bg-orange-200 transition-all";
                }

                btn.onclick = () => showPage(i);
                paginationContainer.appendChild(btn);
            }
        }

        // 처음에 1페이지 강제 표시
        showPage(1);
    });
</script>
</body>
</html>
