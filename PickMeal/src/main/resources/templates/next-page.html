<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick Meal - Menu Slide</title>
    <link rel="icon" href="/images/pickmeal_favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="icon" type="image/png" th:href="@{/images/pickmeal_favicon2.png}">

    <style>
        /* 1. body를 flex 구조로 만들고 최소 높이를 화면 전체(100vh)로 설정 */
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #FDF5E6;
            margin: 0;
            cursor: default;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .nav-link { font-family: 'Fredoka', sans-serif; font-weight: 700; font-style: italic; }
        .section-title { font-family: 'Fredoka', sans-serif; font-weight: 800; font-style: italic; letter-spacing: -2px; color: #1a1a1a; }
        .swiper-container-wrapper { position: relative; padding: 0 50px; max-width: 1400px; margin: 0 auto; }
        .swiper { width: 100%; padding-bottom: 60px !important; padding-top: 20px !important; }
        .food-card { transition: all 0.3s ease; height: 100%; cursor: pointer; border-radius: 3rem; }
        .food-card:hover { transform: translateY(-10px); }
        .swiper-button-next, .swiper-button-prev { color: #FF8A5B !important; }
        .ani-btn { cursor: pointer; border: none; background: none; padding: 0; transition: transform 0.2s; }
        .ani-btn.animate { animation: heart-pop 0.4s ease-out; }
        @keyframes heart-pop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
        .heart-count-text { color: #444; font-size: 13px; font-weight: 700; }
    </style>
</head>
<body>
<header th:replace="~{fragments/header :: headerFragment}"></header>

<div class="flex-grow px-10 pb-10 pt-32">
    <div class="flex justify-between items-end mb-12">
        <div>
            <h2 class="text-5xl font-black text-[#FFB74D] italic uppercase tracking-tighter mb-4">This Month's Top</h2>
            <p class="text-[#FFB74D] mt-3 font-bold italic">The ultimate winners from the Pick Meal game this month!</p>
        </div>
    </div>

    <div class="swiper-container-wrapper">
        <div class="swiper gameSwiper">
            <div class="swiper-wrapper">

                <div class="swiper-slide p-2" th:each="food, stat : ${gameTopList}">

                    <div class="food-card bg-white overflow-hidden shadow-lg border-2 border-gray-50 p-6">

                        <div class="h-56 rounded-[2.5rem] mb-5 flex flex-col items-center justify-center select-none transition group relative bg-cover bg-center"
                             th:style="|background-image: url('${food.imagePath}')|">

                            <div class="absolute top-5 left-5 bg-white text-[#FFB74D] font-black w-10 h-10 rounded-full flex items-center justify-center shadow-md text-lg"
                                 th:text="${stat.count}">1</div>

                        </div>

                        <div class="px-4 text-center">
                            <h3 class="text-xl font-black text-gray-800 italic uppercase truncate"
                                th:text="${food.category}">Korean food</h3>

                            <p class="text-gray-600 mt-2 font-black text-2xl mb-4" th:text="${food.foodName}">갈비찜</p>

                            <div class="flex justify-center items-center gap-2 transition group-hover:scale-110 drop-shadow-md">
                                <span class="text-4xl drop-shadow-lg">🏆</span>
                                <span class="text-black text-2xl font-black" th:text="${food.winCount} + ' Wins!'">100 Wins!</span>
                            </div>

                            <div class="flex justify-center items-center mt-6">
                                <button th:data-keyword="${food.foodName}"
                                        onclick="window.open('https://map.kakao.com/?q=' + this.getAttribute('data-keyword'))"
                                        class="bg-[#FF8A5B] text-white px-8 py-3 rounded-full font-black shadow-md hover:bg-[#e0764c] transition text-sm">
                                    이 메뉴 맛집 찾기
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
        <div class="swiper-button-next game-next"></div>
        <div class="swiper-button-prev game-prev"></div>
    </div>
</div>

<div class="flex-grow px-10 pb-20 pt-10">
    <div class="flex justify-between items-end mb-12">
        <div>
            <h2 class="text-5xl font-black text-[#FF8A5B] italic uppercase tracking-tighter mb-4">Hot List</h2>
            <p class="text-[#FF8A5B] mt-3 font-bold italic">What's your favorite meal today?</p>
        </div>
    </div>



    <div class="swiper-container-wrapper">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper" id="menuWrapper">
                <div class="swiper-slide p-2" th:each="hotSpot : ${hotSpotList}">

                    <div class="food-card bg-white overflow-hidden shadow-lg border-2 border-gray-50 p-6">
                        <div class="h-56 rounded-[2.5rem] mb-5 flex flex-col items-center justify-center select-none transition group relative bg-cover bg-center"
                             th:style="|background-image: url('/images/food_placeholder.png')|">
                        </div>

                        <div class="px-4 text-center">
                            <h3 class="text-xl font-black text-gray-800 italic uppercase truncate"
                                th:text="${hotSpot.placeName}">식당 이름</h3>

                            <p class="text-gray-500 mt-2 font-bold text-lg mb-4" th:text="${hotSpot.category}">카테고리</p>

                            <div class="flex justify-center items-center gap-2 transition group-hover:scale-110 drop-shadow-md">
                                <span class="text-4xl drop-shadow-lg">❤️</span>
                                <span class="text-[#FF8A5B] text-2xl font-black" th:text="${hotSpot.wishCount} + ' Pick!'">5 Pick!</span>
                            </div>

                            <div class="flex justify-between items-center mt-6">
                                <div class="flex gap-3 text-[13px] font-bold text-gray-500 italic items-center">

                                    <span class="flex items-center gap-1 text-orange-400">⭐ <span class="text-gray-700" th:id="'avg-rating-'+${hotSpot.resId}" th:text="${hotSpot.avgRating}">1.5</span></span>

                                    <span class="flex items-center gap-1 text-orange-400">👁️ <span class="text-gray-700" th:id="'view-count-'+${hotSpot.resId}" th:text="${hotSpot.viewCount}">15</span></span>

                                    <button th:data-id="${hotSpot.resId}"
                                            th:data-name="${hotSpot.placeName}"
                                            onclick="handleHeart(this, event)"
                                            class="ani-btn flex items-center gap-1 text-orange-400 hover:scale-110 transition">
                                        ❤️ <span class="text-gray-700 heart-count-text" th:id="'heart-count-'+${hotSpot.resId}" th:text="${hotSpot.wishCount}">10</span>
                                    </button>

                                </div>

                                <button th:data-url="'https://place.map.kakao.com/' + ${hotSpot.resId}"
                                        onclick="window.open(this.getAttribute('data-url'))"
                                        class="bg-[#A8D5BA] text-white px-5 py-2 rounded-full font-black shadow-md hover:bg-[#8fc7a5] transition text-sm">INFO</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>


    new Swiper(".mySwiper", {
        slidesPerView: 3,
        spaceBetween: 25,
        loop: true,
        navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
        breakpoints: { 320: { slidesPerView: 1 }, 768: { slidesPerView: 2 }, 1024: { slidesPerView: 3 } }
    });

    let activePlaceId = null;

function closeAll() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('modal-review').style.display = 'none';
}

async function handleHeart(btn, event) {
    event.stopPropagation();

    const id = btn.getAttribute('data-id');
    const placeName = btn.getAttribute('data-name');

    btn.classList.add('animate');
    setTimeout(() => btn.classList.remove('animate'), 400);

    const params = new URLSearchParams({ placeName: placeName });
    const res = await fetch(`/hotplace/heart/${id}?${params.toString()}`, { method: 'POST' });

    if (res.ok) {
        updateStats(id);
    } else {
        alert("찜하기에 실패했습니다. 로그인이 되어있는지 확인해 주세요!");
    }
}

async function updateStats(id) {
    const res = await fetch('/hotplace/stats', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify([id.toString()]) });
    const data = await res.json();
    if(data.length > 0) {
        const s = data[0];
        document.querySelectorAll(`[id^="avg-rating-${id}"]`).forEach(el => el.innerText = s.avgRating || 0);
        document.querySelectorAll(`[id^="view-count-${id}"]`).forEach(el => el.innerText = s.viewCount);
        document.querySelectorAll(`[id^="heart-count-${id}"]`).forEach(el => el.innerText = s.wishCount);
    }
}

    new Swiper(".gameSwiper", {
    slidesPerView: 3,
    spaceBetween: 25,
    loop: true,
    navigation: { nextEl: ".game-next", prevEl: ".game-prev" },
    breakpoints: { 320: { slidesPerView: 1 }, 768: { slidesPerView: 2 }, 1024: { slidesPerView: 3 } }
});


</script>

<footer th:replace="~{fragments/footer :: footerFragment}"></footer>

</body>
</html>
