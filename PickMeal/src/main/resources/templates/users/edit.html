<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pick Meal - 내 프로필</title>

  <meta name="_csrf" th:content="${_csrf?.token}"/>
  <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700;800&display=swap" rel="stylesheet">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
    body { font-family: 'Fredoka', 'Jua', sans-serif; background-color: #FFF5F0; margin: 0; }
    .edit-card { border-radius: 3rem; background: white; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border: 2px solid #FDF5E6; }
    .input-field { width: 100%; padding: 1rem 1.5rem; border-radius: 1.5rem; border: 2px solid #FFF5F0; background-color: #FDFDFD; font-weight: 800; color: #444; transition: all 0.3s ease; font-size: 1.15rem; }

    h1, h2, h3, h4, h5, h6, p, span, div, button, a, label, input, select, textarea {
        font-family: 'Fredoka', 'Jua', sans-serif !important;
        font-style: normal !important;
    }

    header, footer { z-index: 1200 !important; position: relative; }
    .input-field:focus { outline: none; border-color: #FF8A5B; background-color: white; box-shadow: 0 0 0 4px rgba(255, 138, 91, 0.1); }
    .input-readonly { background-color: #f3f4f6 !important; color: #9ca3af !important; border: 2px solid #e5e7eb !important; cursor: not-allowed !important; box-shadow: none !important; }
    .label-text { color: #FFB08E; font-size: 0.85rem; font-weight: 800; margin-left: 1rem; margin-bottom: 0.2rem; display: block; }
    .btn-action { padding: 0 1.5rem; height: 3.8rem; border-radius: 1.5rem; background-color: #FF8A5B; color: white; font-weight: 800; transition: all 0.3s ease; white-space: nowrap; }
    .btn-action:hover:not(:disabled) { background-color: #e67a4d; transform: scale(1.02); }
    .btn-action:disabled { background-color: #cbd5e1; cursor: not-allowed; }

    /* 모달 */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
    .modal-overlay.active { display: flex; opacity: 1; }
    .modal-card { background: white; width: 90%; max-width: 500px; border-radius: 2.5rem; padding: 2.5rem; transform: translateY(20px); transition: transform 0.3s ease; }
    .modal-overlay.active .modal-card { transform: translateY(0); }
    .phone-group { display: flex; align-items: center; gap: 0.5rem; }
    .pw-wrapper { position: relative; width: 100%; }
    .pw-toggle { position: absolute; right: 1.25rem; top: 50%; transform: translateY(-50%); cursor: pointer; color: #9CA3AF; z-index: 10; }
    .content-slide-up { animation: slideUp 0.8s cubic-bezier(0.65, 0, 0.35, 1) forwards; }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    input::-webkit-calendar-picker-indicator { display: none !important; }
    input::-ms-expand { display: none; }

    /* =======================================================
       🌟 수제 메뉴판(Custom Dropdown)을 예쁘게 꾸미는 CSS(디자인)
       ======================================================= */
    .input-wrapper { position: relative; width: 100%; }
    .custom-dropdown {
        position: absolute; top: 100%; left: 0; right: 0;
        background: white; border: 2px solid #FF8A5B; border-radius: 1.5rem;
        max-height: 250px; overflow-y: auto; z-index: 50;
        box-shadow: 0 10px 25px rgba(255, 138, 91, 0.15);
        margin-top: 0.5rem; display: none; /* 평소에는 숨겨둠 */
    }
    .custom-dropdown.active { display: block; /* 활성화되면 보여짐 */ }
    .custom-option {
        padding: 1rem 1.5rem; font-weight: 700; color: #444;
        cursor: pointer; transition: all 0.2s; border-bottom: 1px solid #FDF5E6;
    }
    .custom-option:last-child { border-bottom: none; }
    .custom-option:hover { background-color: #FFF5F0; color: #FF8A5B; padding-left: 2rem; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

<header th:replace="~{fragments/header :: headerFragment}"></header>

<main class="flex-grow container mx-auto px-6 pt-40 pb-20 max-w-6xl content-slide-up">
  <div class="text-center mb-16">
    <h2 class="text-6xl font-black text-[#FF8A5B] italic tracking-tighter uppercase inline-block relative">
      Edit Profile
      <span class="absolute -bottom-2 left-0 w-full h-2 bg-[#FF8A5B]/10 rounded-full"></span>
    </h2>
  </div>

  <form id="editForm" th:action="@{/users/edit}" th:object="${user}" method="post" onsubmit="return validateEditForm()">
    <input type="hidden" th:field="*{user_id}">
    <input type="hidden" th:field="*{id}">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
      <div class="edit-card p-12 space-y-6">
        <div><label class="label-text">아이디 (변경불가)</label><input type="text" th:value="${displayId}" class="input-field input-readonly" readonly disabled></div>
        <div>
          <label class="label-text">이메일</label>
          <div class="flex gap-3">
            <input type="email" id="emailDisplay" th:value="${user.email != null ? user.email.replaceAll('(^[^@]{2})[^@]+(@[^@]{1})[^@]+(\.[^@]+$)', '$1******$2*******$3') : ''}" class="input-field input-readonly" readonly>
            <button th:if="${user.socialLoginSite == null or user.socialLoginSite == ''}" type="button" onclick="openModal('emailModal')" class="btn-action">수정</button>
          </div>
        </div>
        <div th:if="${user.socialLoginSite == null or user.socialLoginSite == ''}">
          <label class="label-text">비밀번호</label>
          <div class="flex gap-3">
            <input type="password" value="********" class="input-field input-readonly" readonly>
            <button type="button" onclick="openModal('pwModal')" class="btn-action">수정</button>
          </div>
        </div>
        <div>
          <label class="label-text">닉네임</label>
          <div class="flex gap-3">
            <input type="text" th:field="*{nickname}" id="nicknameInput" class="input-field" required>
            <button type="button" id="checkNickBtn" onclick="checkNickname()" class="btn-action">중복확인</button>
          </div>
          <p id="nickStatus" class="text-xs mt-2 ml-4 font-bold"></p>
        </div>
        <div><label class="label-text">이름 (변경불가)</label><input type="text" th:field="*{name}" class="input-field input-readonly" readonly disabled></div>
        <div>
          <label class="label-text">전화번호 (변경불가)</label>
          <div class="phone-group">
            <input type="text" id="phone1" class="input-field input-readonly" value="010" readonly style="width: 25%; text-align: center;">
            <span class="font-bold text-gray-400">-</span>
            <input type="text" id="phone2" class="input-field input-readonly" readonly style="width: 35%; text-align: center;">
            <span class="font-bold text-gray-400">-</span>
            <input type="text" id="phone3" class="input-field input-readonly" readonly style="width: 35%; text-align: center;">
            <input type="hidden" th:field="*{phoneNumber}" id="fullPhone">
          </div>
        </div>
      </div>

      <div class="edit-card p-12 bg-[#FF8A5B]/2 space-y-10">
        <h3 class="text-3xl font-black text-[#FF8A5B] italic uppercase tracking-tight">음식 취향</h3>

        <div>
          <label class="label-text text-blue-400">좋아하는 음식 ❤️</label>
          <div class="input-wrapper">
            <input type="text" th:field="*{likeMenu}" autocomplete="off" class="input-field" placeholder="쉼표로 구분해 입력해주세요.">
            <div id="likeMenuDropdown" class="custom-dropdown"></div>
          </div>
        </div>

        <div>
          <label class="label-text text-red-400">싫어하는 음식 💔</label>
          <div class="input-wrapper">
            <input type="text" th:field="*{disLikeMenu}" autocomplete="off" class="input-field" placeholder="못 먹는 음식을 쉼표로 구분해 입력해주세요.">
            <div id="dislikeMenuDropdown" class="custom-dropdown"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-16 flex justify-center gap-6">
      <button type="submit" class="px-12 py-5 bg-[#FF8A5B] text-white rounded-full font-black text-xl shadow-xl hover:bg-[#e67a4d] hover:scale-105 transition-all italic uppercase">정보 저장</button>
      <a th:href="@{/users/mypage}" class="px-12 py-5 bg-slate-200 text-slate-500 rounded-full font-black text-xl hover:bg-red-50 hover:text-red-500 transition-all italic uppercase">취소</a>
    </div>
  </form>
</main>

<div id="emailModal" class="modal-overlay" onclick="closeModalOnOutSide(event)">
  <div class="modal-card space-y-6">
    <h3 class="text-3xl font-black text-[#FF8A5B]">이메일 변경</h3>
    <div id="emailStep1">
      <label class="label-text">현재 등록된 이메일 입력</label>
      <div class="flex gap-2">
        <input type="email" id="currEmail" class="input-field" placeholder="현재 이메일">
        <button type="button" onclick="verifyEmailStep1()" class="btn-action">확인</button>
      </div>
    </div>
    <div id="emailStep2" class="hidden space-y-4">
      <label class="label-text">변경할 새 이메일</label>
      <div class="flex gap-2">
        <input type="email" id="newEmail" class="input-field" placeholder="새 이메일">
        <button type="button" onclick="sendCode()" class="btn-action">인증번호</button>
      </div>
      <div class="relative">
        <input type="text" id="verifyCode" class="input-field" placeholder="인증번호 6자리">
        <span id="timer" class="absolute right-32 top-1/2 -translate-y-1/2 text-red-500 font-bold hidden">05:00</span>
        <button type="button" id="codeVerifyBtn" onclick="verifyEmailCode()" class="btn-action absolute right-0 top-0">인증</button>
      </div>
    </div>
    <div class="flex justify-end gap-3 mt-4 border-t pt-6">
      <button type="button" onclick="closeModal('emailModal')" class="font-bold text-gray-400 mr-auto">취소</button>
      <button type="button" id="emailUpdateSubmit" onclick="apiUpdateEmail()" class="btn-action px-10" disabled>수정하기</button>
    </div>
  </div>
</div>

<div id="pwModal" class="modal-overlay" onclick="closeModalOnOutSide(event)">
  <div class="modal-card space-y-4">
    <h3 class="text-3xl font-black text-[#FF8A5B]">비밀번호 변경</h3>
    <div class="pw-wrapper"><input type="password" id="currPw" placeholder="현재 비밀번호" class="input-field pr-12"><span class="pw-toggle" onclick="togglePw('currPw', 'eyeC')"><i data-lucide="eye" id="eyeC"></i></span><p id="currPwError" class="text-xs text-red-500 hidden font-bold ml-4">현재 비밀번호가 일치하지 않습니다.</p></div>
    <div class="pw-wrapper"><input type="password" id="modalNewPw" placeholder="새 비밀번호" class="input-field pr-12"><span class="pw-toggle" onclick="togglePw('modalNewPw', 'eyeN')"><i data-lucide="eye" id="eyeN"></i></span><p id="pwComplexityMsg" class="text-[0.7rem] text-gray-400 mt-1 font-bold ml-4">8자 이상 입력해주세요.</p></div>
    <div class="pw-wrapper"><input type="password" id="modalNewPwCheck" placeholder="새 비밀번호 확인" class="input-field pr-12"><span class="pw-toggle" onclick="togglePw('modalNewPwCheck', 'eyeK')"><i data-lucide="eye" id="eyeK"></i></span><p id="pwMatchMsg" class="text-[0.7rem] text-gray-400 mt-1 font-bold ml-4">비밀번호를 재입력해주세요.</p></div>
    <div class="flex justify-end pt-6 border-t"><button type="button" id="pwUpdateBtn" onclick="apiUpdatePassword()" class="btn-action px-10" disabled>변경하기</button></div>
  </div>
</div>

<script th:inline="javascript">
  lucide.createIcons();
  const csrf = { token: document.querySelector('meta[name="_csrf"]')?.content, header: document.querySelector('meta[name="_csrf_header"]')?.content };
  const initialNickname = /*[[${user.nickname}]]*/ '';
  const initialEmail = /*[[${user.email}]]*/ '';
  let isNicknameValid = true;
  let timerInterval;

  const fp = document.getElementById('fullPhone'), p2 = document.getElementById('phone2'), p3 = document.getElementById('phone3');
  document.addEventListener('DOMContentLoaded', () => {
    if (fp.value) {
      const pts = fp.value.split('-');
      if (pts.length === 3) { p2.value = pts[1].substring(0, 1) + '***'; p3.value = pts[2].substring(0, 1) + '***'; }
    }
  });

  document.getElementById('nicknameInput').addEventListener('input', (e) => {
    const s = document.getElementById('nickStatus');
    if(e.target.value === initialNickname) { isNicknameValid = true; s.innerText = ""; }
    else { isNicknameValid = false; s.innerText = "중복 확인 필요 ⚠️"; s.className = "text-xs text-orange-400 font-bold ml-4"; }
  });

  async function checkNickname() {
    const nick = document.getElementById('nicknameInput').value;
    if(!nick) return alert("닉네임을 입력해주세요.");
    const res = await fetch(`/users/check-nickname?nickname=${encodeURIComponent(nick)}`);
    if(await res.text() === "success") {
      isNicknameValid = true;
      document.getElementById('nickStatus').innerText = "사용 가능 ✨";
      document.getElementById('nickStatus').className = "text-xs text-green-500 font-bold ml-4";
      alert("사용 가능한 닉네임입니다!");
    } else { alert("이미 사용 중인 닉네임입니다."); }
  }

  function verifyEmailStep1() {
    if(document.getElementById('currEmail').value === initialEmail) {
      document.getElementById('emailStep1').classList.add('hidden');
      document.getElementById('emailStep2').classList.remove('hidden');
    } else { alert("현재 등록된 이메일과 일치하지 않습니다."); }
  }

  async function sendCode() {
    const newMail = document.getElementById('newEmail').value.trim();
    if(!newMail) return alert("새 이메일을 입력해주세요.");
    const res = await fetch('/mail/send', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded', [csrf.header]: csrf.token }, body: new URLSearchParams({ email: newMail, type: 'EDIT' }) });
    if(res.ok) { startTimer(300); alert("인증번호가 발송되었습니다."); } else if(res.status === 409) { alert("이미 가입된 이메일입니다."); }
  }

  function startTimer(duration) {
    clearInterval(timerInterval);
    const display = document.getElementById('timer'); display.classList.remove('hidden'); let timer = duration;
    timerInterval = setInterval(() => {
      let m = Math.floor(timer / 60); let s = timer % 60;
      display.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
      if (--timer < 0) { clearInterval(timerInterval); display.innerText = "만료"; }
    }, 1000);
  }

  async function verifyEmailCode() {
    const res = await fetch('/mail/verify', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded', [csrf.header]: csrf.token }, body: new URLSearchParams({ code: document.getElementById('verifyCode').value }) });
    if(await res.text() === "success") { alert("인증에 성공했습니다."); clearInterval(timerInterval); document.getElementById('emailUpdateSubmit').disabled = false; } else { alert("인증번호가 올바르지 않습니다."); }
  }

  async function apiUpdateEmail() {
    const res = await fetch('/users/update-email', { method: 'POST', headers: { 'Content-Type': 'application/json', [csrf.header]: csrf.token }, body: JSON.stringify({ email: document.getElementById('newEmail').value }) });
    if(res.ok) { alert("이메일이 변경되었습니다."); location.reload(); }
  }

  const mP1 = document.getElementById('modalNewPw'), mP2 = document.getElementById('modalNewPwCheck'), pwBtn = document.getElementById('pwUpdateBtn');
  const pwRegex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,}$/;
  function validatePasswords() {
    const v1 = mP1.value, v2 = mP2.value, isComp = pwRegex.test(v1), isMatch = (v1 === v2 && v1.length > 0);
    const msg = document.getElementById('pwComplexityMsg'), mMsg = document.getElementById('pwMatchMsg');
    if(v1.length < 8) { msg.innerText = "8자 이상 입력해주세요 ✍️"; msg.className = "text-[0.7rem] font-bold text-red-500 ml-4"; }
    else if(!isComp) { msg.innerText = "영문+숫자+특수문자 조합 필요 ⚠️"; msg.className = "text-[0.7rem] font-bold text-yellow-600 ml-4"; }
    else { msg.innerText = "사용 가능한 비밀번호입니다 ✅"; msg.className = "text-[0.7rem] font-bold text-green-500 ml-4"; }
    mMsg.innerText = v2.length === 0 ? "비밀번호를 재입력해주세요." : (isMatch ? "일치합니다 ✨" : "일치하지 않습니다 ❌");
    mMsg.className = isMatch ? "text-[0.7rem] font-bold text-green-500 ml-4" : "text-[0.7rem] font-bold text-red-500 ml-4";
    pwBtn.disabled = !(isComp && isMatch);
  }
  [mP1, mP2].forEach(el => el.addEventListener('input', validatePasswords));

  async function apiUpdatePassword() {
    const res = await fetch('/users/update-password', { method: 'POST', headers: { 'Content-Type': 'application/json', [csrf.header]: csrf.token }, body: JSON.stringify({ currentPassword: document.getElementById('currPw').value, newPassword: mP1.value }) });
    if(await res.text() === "success") { alert("비밀번호가 변경되었습니다."); location.reload(); } else { document.getElementById('currPwError').classList.remove('hidden'); }
  }

  function togglePw(id, eId) {
    const i = document.getElementById(id), e = document.getElementById(eId); i.type = i.type === 'password' ? 'text' : 'password';
    e.setAttribute('data-lucide', i.type === 'password' ? 'eye' : 'eye-off'); lucide.createIcons();
  }

  function openModal(id) { document.getElementById(id).classList.add('active'); }
  function closeModal(id) { document.getElementById(id).classList.remove('active'); }
  function closeModalOnOutSide(e) { if(e.target.classList.contains('modal-overlay')) e.target.classList.remove('active'); }
  function validateEditForm() { if(!isNicknameValid) { alert("닉네임 중복 확인이 필요합니다."); return false; } return true; }


  // =======================================================
  // 🌟 완벽 진화! 수제 메뉴판 관리 매니저 (JavaScript)
  // =======================================================
  const foodMasterList = [
      "갈비찜", "감자탕", "곱창전골", "김치찌개", "냉면", "닭볶음탕", "된장찌개", "떡볶이", "보쌈", "부대찌개",
      "불고기", "비빔밥", "삼겹살", "삼계탕", "설렁탕", "소머리국밥", "순대국밥", "순대볶음", "순두부찌개", "육개장",
      "제육볶음", "족발", "칼국수", "해물파전", "고추잡채", "군만두", "깐풍기", "꿔바로우", "난자완스", "딤섬",
      "라조기", "마라탕", "마파두부", "볶음밥", "북경오리구이", "사천탕수육", "양꼬치", "유린기", "유산슬", "잡채밥",
      "짜장면", "짬뽕", "칠리새우", "탄탄면", "탕수육", "탕후루", "팔보채", "가츠동", "규동", "나베",
      "덴푸라", "돈카츠", "돈코츠라멘", "라멘", "마제소바", "메밀소바", "모츠나베", "몬자야키", "사케동", "샤브샤브",
      "소유라멘", "스시", "스키야키", "야키소바", "야키토리", "에비후라이", "오니기리", "오코노미야키", "우동", "치킨가라아게",
      "카레라이스", "카이센동", "타코야키", "텐동", "회덮밥", "후토마키", "감바스", "고르곤졸라피자", "까르보나라", "뇨끼",
      "라자냐", "로제파스타", "마르게리따피자", "미트볼스파게티", "바비큐폭립", "봉골레파스타", "부리또", "비프스튜", "샌드위치", "수제버거",
      "슈바인학센", "스프", "시카고피자", "안심스테이크", "알리오올리오", "양갈비스테이크", "잠봉뵈르", "칠리콘카르네", "퀘사디아", "타코",
      "토마토파스타", "투움바파스타", "티본스테이크", "페퍼로니피자", "포테이토피자", "프렌치토스트", "피쉬앤칩스", "하와이안피자", "함박스테이크", "화이트라구파스타",
      "스프링롤", "나시고랭", "똠양꿍", "랭쌥", "미고랭", "반미", "반쎄오", "분짜", "사모사", "샤슬릭",
      "쌀국수", "아목", "월남쌈", "인도커리&난", "짜조", "칠리크랩", "카오카무", "카오팟", "케밥", "탄두리치킨",
      "팟타이", "푸팟퐁커리", "허르헉"
  ];

  // 입력창(input)과 수제 메뉴판(dropdown)을 짝지어 연결하는 일꾼
  function createCustomAutocomplete(inputId, dropdownId) {
      const input = document.getElementById(inputId);
      const dropdown = document.getElementById(dropdownId);
      if (!input || !dropdown) return;

      // 1. 키보드 입력 이벤트 감지
      input.addEventListener('input', function() {
          const fullVal = this.value;
          const parts = fullVal.split(',');
          // 맨 마지막 단어 추출 (예: "치")
          const currentWord = parts.pop().trim();
          // 앞에 입력했던 단어들 킵해두기 (예: "피자, ")
          const prefix = parts.length > 0 ? parts.join(', ') + ', ' : '';

          // 메뉴판 지우기
          dropdown.innerHTML = "";

          // 만약 방금 쉼표를 찍고 아무 글자도 안 쳤거나 빈칸이면 메뉴판 숨김
          if (currentWord.length === 0) {
              dropdown.classList.remove('active');
              return;
          }

          let hasMatch = false; // 검색 결과가 하나라도 있는지 확인용

          foodMasterList.forEach(food => {
              // 앞에서 이미 고른 음식은 빼고, 검색어와 일치하는 음식만 찾기
              if (!prefix.includes(food) && food.includes(currentWord)) {
                  hasMatch = true;

                  // <div> 태그로 나만의 '옵션' 생성
                  const optionDiv = document.createElement('div');
                  optionDiv.className = 'custom-option';
                  // 🌟 화면에는 깔끔하게 '치킨' 하나만 보여줍니다!
                  optionDiv.textContent = food;

                  // 🌟 마우스로 메뉴를 클릭했을 때의 마법!
                  optionDiv.addEventListener('click', function() {
                      // 입력창에는 [과거 글자들 + 방금 클릭한 글자 + 쉼표]를 조립해서 꽂아넣습니다.
                      input.value = prefix + food + ", ";
                      dropdown.classList.remove('active'); // 볼일 끝났으니 메뉴판 닫기
                      input.focus(); // 커서를 입력창에 다시 두기
                  });

                  dropdown.appendChild(optionDiv);
              }
          });

          // 검색 결과가 있으면 메뉴판 띄우고, 없으면 닫기
          if (hasMatch) {
              dropdown.classList.add('active');
          } else {
              dropdown.classList.remove('active');
          }
      });

      // 2. 화면 다른 곳을 클릭하면 센스 있게 메뉴판을 접어주는 기능
      document.addEventListener('click', function(e) {
          if (e.target !== input && !dropdown.contains(e.target)) {
              dropdown.classList.remove('active');
          }
      });
  }

  // 🌟 타임리프가 만들어낸 진짜 ID인 'likeMenu'와 'disLikeMenu'를 넘겨줍니다!
  window.addEventListener('load', () => {
      createCustomAutocomplete('likeMenu', 'likeMenuDropdown');
      createCustomAutocomplete('disLikeMenu', 'dislikeMenuDropdown');
  });
</script>
