<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>Pick Meal - 회원가입</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700;800&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
    body { font-family: 'Fredoka', 'Jua', sans-serif; background-color: #FFF5F0; margin: 0; }

    h1, h2, h3, h4, h5, h6, p, span, div, button, a, label, input, select, textarea {
            font-family: 'Fredoka', 'Jua', sans-serif !important;
            font-style: normal !important;
        }
    .signup-card { border-radius: 3rem; background: white; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
    .input-field { border-radius: 1.2rem; transition: all 0.3s; border: 2px solid #FDF5E6; width: 100%; font-weight: 700; color: #1F2937; background-color: #ffffff; font-size: 0.9rem; padding: 0.75rem 1.25rem; }
    .input-field:focus { border-color: #FF8A5B; outline: none; background-color: #ffffff; box-shadow: 0 0 0 4px rgba(255, 138, 91, 0.1); }
    .status-msg { font-size: 0.7rem; font-weight: 700; margin-left: 0.75rem; margin-top: 0.25rem; display: block; }
    .text-guide { color: #9CA3AF; }
    .btn-check { background-color: #FF8A5B; color: white; font-weight: 800; border-radius: 1.2rem; padding: 0 1.5rem; transition: all 0.3s; white-space: nowrap; height: 3.25rem; }
    .btn-check:hover { background-color: #E67A4D; transform: translateY(-1px); }
    .strength-meter { height: 6px; width: 100%; background-color: #F3F4F6; border-radius: 3px; margin-top: 8px; overflow: hidden; }
    .strength-bar { height: 100%; width: 0%; transition: all 0.5s ease; }

    /* 타이머 배지 스타일 */
    .timer-badge { display: none; background: #FFF5F0; color: #FF8A5B; padding: 6px 14px; border-radius: 1.2rem; font-size: 0.85rem; font-weight: 800; border: 2px solid #FF8A5B; }

    /* [신규] 인증 완료 배지 스타일 */
    .verified-badge {
      display: none;
      align-items: center;
      gap: 6px;
      background-color: #ECFDF5;
      color: #10B981;
      padding: 6px 14px;
      border-radius: 1.2rem;
      font-size: 0.8rem;
      font-weight: 900;
      border: 2px solid #10B981;
      font-style: italic;
      text-transform: uppercase;
      animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes bounceIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .phone-group { display: flex; align-items: center; gap: 0.5rem; }
    .phone-input { text-align: center; padding: 0.75rem 0.5rem !important; }
    .pw-wrapper { position: relative; width: 100%; }
    .pw-toggle { position: absolute; right: 1.25rem; top: 50%; transform: translateY(-50%); cursor: pointer; color: #9CA3AF; transition: color 0.3s; }
  </style>
</head>

<body class="min-h-screen flex flex-col">
<header th:replace="~{fragments/header :: headerFragment}"></header>

<main class="flex-grow flex items-start justify-center px-4 pt-32 pb-10">
  <div class="signup-card p-12 w-full max-w-2xl text-center border-2 border-gray-50">
    <h2 class="text-4xl font-black text-[#FF8A5B] italic mb-2 uppercase tracking-tighter">회원 가입</h2>
    <p class="text-gray-400 font-bold mb-10 italic">당신의 정보를 더 알려주세요!</p>

    <form id="signupForm" th:action="@{/users/signup}" th:object="${user}" method="post" onsubmit="return validateForm()" class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
      <input type="hidden" th:field="*{socialId}"><input type="hidden" th:field="*{socialLoginSite}">

      <div class="space-y-4 md:col-span-2">
        <label class="font-black text-gray-700 italic ml-2 uppercase">기본 정보</label>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="flex flex-col gap-1">
            <div class="flex gap-2">
              <input type="text" th:field="*{id}" placeholder="아이디 입력" class="input-field" th:readonly="${isSocial}" required>
              <button type="button" th:if="${!isSocial}" id="btnCheckId" onclick="checkIdDuplication()" class="btn-check text-xs uppercase">중복확인</button>
            </div>
            <span id="idStatus" class="status-msg text-guide">영문 소문자, 숫자 조합 5~20자</span>
          </div>

          <div class="flex flex-col gap-1" th:if="${!isSocial}">
            <div class="pw-wrapper">
              <input type="password" th:field="*{password}" id="password" placeholder="비밀번호 입력" class="input-field pr-12" required>
              <span class="pw-toggle" onclick="togglePasswordVisibility()"><i data-lucide="eye" id="eyeIcon"></i></span>
            </div>
            <div class="strength-meter"><div id="strengthBar" class="strength-bar"></div></div>
            <span id="pwStatus" class="status-msg text-guide">영문+숫자+특수문자 포함 8자 이상</span>
          </div>
        </div>
      </div>

      <div class="space-y-4 md:col-span-1">
        <label class="font-black text-gray-700 italic ml-2 uppercase">사용자 정보</label>
        <input type="text" th:field="*{name}" placeholder="이름" class="input-field" required>
        <div class="flex flex-col gap-1">
          <div class="flex gap-2">
            <input type="text" th:field="*{nickname}" id="nicknameInput" placeholder="닉네임" class="input-field" required>
            <button type="button" id="btnCheckNickname" onclick="checkNicknameDuplication()" class="btn-check text-xs uppercase">중복확인</button>
          </div>
          <span id="nicknameStatus" class="status-msg text-guide">멋진 닉네임을 입력해주세요!</span>
        </div>
      </div>

      <div class="space-y-4 md:col-span-1">
        <label class="font-black text-gray-700 italic ml-2 uppercase">세부 정보</label>
        <div class="flex flex-col gap-2">
          <div class="flex gap-2">
            <input type="email" th:field="*{email}" placeholder="이메일 주소" class="input-field" th:readonly="${isSocial}" required>
            <button type="button" id="btnSendMail" onclick="sendAuthMail()" th:if="${!isSocial}" class="btn-check text-xs uppercase">발송</button>
          </div>
          <div class="flex gap-2 items-center" th:if="${!isSocial}">
            <input type="text" id="emailAuthCode" placeholder="인증번호" class="input-field text-sm">
            <button type="button" id="btnVerifyMail" onclick="verifyEmailCode()" class="btn-check text-xs uppercase bg-gray-400">인증</button>
            <span id="timer" class="timer-badge">05:00</span>
            <span id="verifiedMark" class="verified-badge">
              <i data-lucide="check-circle" style="width:16px; height:16px;"></i>
              Verified
            </span>
          </div>
        </div>
        <div class="phone-group">
          <input type="text" id="phone1" class="input-field phone-input" value="010" readonly style="width: 25%;">
          <span class="font-bold text-gray-400">-</span>
          <input type="tel" id="phone2" class="input-field phone-input" maxlength="4" placeholder="1234" style="width: 35%;">
          <span class="font-bold text-gray-400">-</span>
          <input type="tel" id="phone3" class="input-field phone-input" maxlength="4" placeholder="5678" style="width: 35%;">
          <input type="hidden" th:field="*{phoneNumber}" id="fullPhone">
        </div>
      </div>

      <div class="space-y-4 md:col-span-2">
        <label class="font-black text-gray-700 italic ml-2 uppercase">출생 정보</label>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input type="date" th:field="*{birthDate}" class="input-field text-gray-500" required>
          <select th:field="*{gender}" class="input-field text-gray-500" required>
            <option value="">성별 선택</option>
            <option value="M">남성</option>
            <option value="F">여성</option>
          </select>
        </div>
      </div>

      <div class="space-y-4 md:col-span-2">
        <label class="font-black text-gray-700 italic ml-2 uppercase text-sm">음식 선호도</label>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input type="text" th:field="*{likeMenu}" placeholder="좋아하는 음식" class="input-field">
          <input type="text" th:field="*{disLikeMenu}" placeholder="싫어하는 음식" class="input-field">
        </div>
      </div>

      <button type="submit" class="bg-[#FF8A5B] md:col-span-2 text-white py-5 rounded-full font-black text-xl shadow-lg transition italic uppercase active:scale-95 mt-4">가입을 환영합니다</button>
    </form>
  </div>
</main>

<script th:inline="javascript">
  lucide.createIcons();
  const isSocial = /*[[${isSocial}]]*/ false;
  let lastCheckedId = isSocial ? document.querySelector('input[name="id"]').value : '';
  let lastCheckedNickname = '';
  let isEmailVerified = isSocial;
  let timerInterval;

  const idInput = document.querySelector('input[name="id"]');
  const pwInput = document.getElementById('password');
  const nickInput = document.getElementById('nicknameInput');
  const fullPhone = document.getElementById('fullPhone');
  const idRegex = /^[a-z0-9]{5,20}$/;
  const pwRegex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,}$/;

  function togglePasswordVisibility() {
      pwInput.type = (pwInput.type === 'password') ? 'text' : 'password';
      document.getElementById('eyeIcon').setAttribute('data-lucide', pwInput.type === 'password' ? 'eye' : 'eye-off');
      lucide.createIcons();
  }

  if(idInput && !idInput.readOnly) {
      idInput.addEventListener('input', () => {
          const status = document.getElementById('idStatus');
          if(!idRegex.test(idInput.value)) {
              status.innerText = "5~20자 영문 소문자, 숫자 조합 ❌"; status.className = "status-msg text-red-400";
          } else if(idInput.value !== lastCheckedId) {
              status.innerText = "중복확인이 필요합니다."; status.className = "status-msg text-orange-400";
          } else {
              status.innerText = "사용 가능합니다! ✨"; status.className = "status-msg text-green-400";
          }
      });
  }

  if(pwInput) {
      pwInput.addEventListener('input', () => {
          const val = pwInput.value;
          const bar = document.getElementById('strengthBar');
          const status = document.getElementById('pwStatus');
          let strength = 0;
          if(val.length >= 8) strength++;
          if(/[A-Za-z]/.test(val) && /\d/.test(val)) strength++;
          if(/[@$!%*#?&]/.test(val)) strength++;

          if(val.length === 0) {
              bar.style.width = '0%'; status.innerText = "영문+숫자+특수문자 포함 8자 이상"; status.className = "status-msg text-guide";
          } else if(val.length < 8) {
              bar.style.width = '33%'; bar.style.backgroundColor = '#ef4444'; status.innerText = "최소 8자 이상 입력해주세요. ✍️"; status.className = "status-msg text-red-500";
          } else if(strength < 3) {
              bar.style.width = '66%'; bar.style.backgroundColor = '#facc15'; status.innerText = "조합이 부족합니다. (영문+숫자+특수문자) ⚠️"; status.className = "status-msg text-yellow-600";
          } else {
              bar.style.width = '100%'; bar.style.backgroundColor = '#22c55e'; status.innerText = "안전합니다! ✅"; status.className = "status-msg text-green-500";
          }
      });
  }

  nickInput.addEventListener('input', () => {
      const status = document.getElementById('nicknameStatus');
      if(nickInput.value !== lastCheckedNickname) {
          status.innerText = "중복확인이 필요합니다. ⚠️"; status.className = "status-msg text-orange-400";
      } else if(lastCheckedNickname !== "") {
          status.innerText = "사용 가능합니다! ✨"; status.className = "status-msg text-green-400";
      }
  });

  const p2 = document.getElementById('phone2'), p3 = document.getElementById('phone3');
  [p2, p3].forEach((input, index) => {
      input.addEventListener('input', () => {
          input.value = input.value.replace(/[^0-9]/g, '');
          if (input.value.length >= 4 && index === 0) p3.focus();
          fullPhone.value = (p2.value && p3.value) ? `010-${p2.value}-${p3.value}` : "";
      });
      input.addEventListener('keydown', (e) => { if (e.key === 'Backspace' && input.value.length === 0 && index === 1) p2.focus(); });
  });

  async function checkIdDuplication() {
      const id = idInput.value.trim();
      if(!idRegex.test(id)) return alert("아이디 형식을 확인해주세요.");
      const response = await fetch(`/users/check-id?id=${id}`);
      if(await response.text() === 'success') {
          lastCheckedId = id; document.getElementById('idStatus').innerText = "사용 가능! ✨"; document.getElementById('idStatus').className = "status-msg text-green-400"; alert("사용 가능한 아이디입니다!");
      } else { alert("중복된 아이디입니다."); }
  }

  async function checkNicknameDuplication() {
      const nick = nickInput.value.trim();
      if(!nick) return alert("닉네임을 입력해주세요.");
      const response = await fetch(`/users/check-nickname?nickname=${encodeURIComponent(nick)}`);
      if(await response.text() === 'success') {
          lastCheckedNickname = nick; document.getElementById('nicknameStatus').innerText = "사용 가능! ✨"; document.getElementById('nicknameStatus').className = "status-msg text-green-400"; alert("사용 가능한 닉네임입니다!");
      } else { alert("중복된 닉네임입니다."); }
  }

  function startTimer() {
      let timeLeft = 300;
      const display = document.getElementById('timer');
      const vMark = document.getElementById('verifiedMark');

      display.style.display = 'inline-block';
      vMark.style.display = 'none'; // 타이머 시작 시 인증마크 숨김

      if(timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
          display.innerText = `${Math.floor(timeLeft / 60).toString().padStart(2, '0')}:${(timeLeft % 60).toString().padStart(2, '0')}`;
          if(--timeLeft < 0) {
            clearInterval(timerInterval);
            display.innerText = "만료";
            display.style.color = "red";
          }
      }, 1000);
  }

  async function sendAuthMail() {
      const email = document.querySelector('input[name="email"]').value.trim();
      if(!email) return alert("이메일을 입력해주세요.");
      const csrf = document.querySelector('meta[name="_csrf"]').content;
      try {
          const response = await fetch('/mail/send', {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-CSRF-TOKEN': csrf },
              body: `email=${encodeURIComponent(email)}`
          });
          if(response.ok) { alert("인증번호가 발송되었습니다!"); startTimer(); }
          else if(response.status === 409) alert("이미 가입된 이메일입니다.");
          else alert("발송 실패.");
      } catch (e) { alert("서버 통신 오류"); }
  }

  async function verifyEmailCode() {
      const code = document.getElementById('emailAuthCode').value.trim();
      if(!code) return alert("인증번호를 입력해주세요.");
      const response = await fetch('/mail/verify', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: `code=${code}` });
      const resText = await response.text();

      if(resText === "success") {
          alert("인증 완료! ✅");
          isEmailVerified = true;
          clearInterval(timerInterval);

          const timer = document.getElementById('timer');
          const vMark = document.getElementById('verifiedMark');
          const verifyBtn = document.getElementById('btnVerifyMail');
          const authInput = document.getElementById('emailAuthCode');

          timer.style.display = 'none';
          vMark.style.display = 'flex'; // 배지 표시

          authInput.readOnly = true;
          authInput.style.backgroundColor = '#F9FAFB';
          verifyBtn.disabled = true;
          verifyBtn.style.opacity = '0.5';
          verifyBtn.innerText = "DONE";

          lucide.createIcons();
      } else if(resText === "timeout") alert("시간이 초과되었습니다.");
      else alert("인증번호 불일치.");
  }

  function validateForm() {
      if(!isSocial) {
          if(idInput.value !== lastCheckedId) { alert("아이디 중복확인을 해주세요."); return false; }
          if(!pwRegex.test(pwInput.value)) { alert("비밀번호 규칙을 확인해주세요."); return false; }
      }
      if(nickInput.value.trim() !== lastCheckedNickname) { alert("닉네임 중복확인을 해주세요."); return false; }
      if(!isEmailVerified) { alert("이메일 인증이 필요합니다."); return false; }
      if(!fullPhone.value) { alert("전화번호를 입력해주세요."); return false; }
      return true;
  }
</script>
<footer th:replace="~{fragments/footer :: footerFragment}"></footer>
</body>
</html>
