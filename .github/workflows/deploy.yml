name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests)
        run: mvn -B package -DskipTests

      - name: Get artifact version
        id: artifact
        run: echo "jar=target/PickMeal-0.0.1-SNAPSHOT.jar" >> $GITHUB_OUTPUT

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp ${{ steps.artifact.outputs.jar }} deploy/application.jar
          cp Procfile deploy/Procfile
          cp -r .ebextensions deploy/.ebextensions
          cp -r .platform deploy/.platform
          cd deploy && zip -r ../deploy.zip .

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ap-northeast-2
          application_name: pickmeal
          environment_name: pickmeal-prod
          version_label: pickmeal-${{ github.sha }}
          deployment_package: deploy.zip
          wait_for_environment_recovery: 120
