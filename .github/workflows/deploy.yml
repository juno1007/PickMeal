name: Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'adopt'

      # 1. working-directory를 삭제했습니다. 바로 실행합니다.
      - name: Grant execute permission for gradlew
        run: chmod +x ./mvnw

      # 2. 학생분은 Gradle이 아니라 Maven(mvnw)을 사용 중이시네요! 명령어를 바꿨습니다.
      - name: Build with Maven
        run: ./mvnw package -DskipTests

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v20
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: pickmeal
          environment_name: Pickmeal-env
          version_label: ${{ github.sha }}
          region: ap-northeast-2
          # 3. 빌드된 결과물(jar)은 target 폴더 안에 생깁니다.
          deployment_package: target/PickMeal-0.0.1-SNAPSHOT.jar